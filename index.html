<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onu Sano · Tööriistad</title>
<meta name="description" content="Onu Sano tööriistad — vali tööriist, mida soovid kasutada.">
<meta property="og:title" content="Onu Sano · Tööriistad">
<meta property="og:description" content="Onu Sano tööriistad — vali tööriist, mida soovid kasutada.">
<link rel="icon" href="assets/icon-1024x1024px.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Shared page transition — slides tools in from the right (reversed on Back). -->
<link rel="stylesheet" href="assets/transition.css">
<script src="assets/transition.js"></script>
<style>
  /* ─────────────────────────────────────────────────────────────
     Onu Sano · Tööriistad — tool launcher
     House style borrowed from the Podcast framer (Delfi light theme):
     near-white textured base, white cards, near-black ink, black
     accent reserved for hover/selection. One family: Google Sans Flex.
     ───────────────────────────────────────────────────────────── */
  :root {
    --bg:           #fbfbfc;   /* app base behind the soft texture */
    --card:         #ffffff;   /* card / panel surface */
    --border:       #ebebeb;   /* card hairline */
    --border-2:     #dedfe0;   /* stronger hairline */
    --ink:          #111317;   /* near-black: headings + solid fills */
    --muted:        #708597;   /* delfi-darkgray: secondary text */
    --track:        #edf2f4;   /* delfi-lightgray: icon plate fill */
    --hover:        #f2f4f6;   /* subtle hover wash */
    --accent:       #000000;   /* hover + selection chrome */
    --focus:        #000000;   /* keyboard focus ring */
    --shadow-card:  0 4px 5px rgba(0,0,0,0.10);
    --shadow-hover: 0 10px 28px rgba(17,19,23,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: "Google Sans Flex", "Google Sans", "Product Sans", "DM Sans",
                 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink);
    color-scheme: light;
    background-color: var(--bg);
    background-image: url("assets/bg-texture.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ───── Page shell ───── */
  .page {
    flex: 1 1 auto;
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    padding: 64px 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ───── Brand header (shared pattern: face · Onu Sano® · sub) ───── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0;
    font-size: 32.5px;
    line-height: 1.2;
    font-weight: 400;
  }
  .brand-face { height: 50px; width: auto; display: block; }
  .brand-name { font-weight: 700; }
  .brand-sub  { font-weight: 300; }

  /* Page-transition names — launcher-scoped (see assets/transition.css). Kept here,
     not in the shared file, so they don't collide with tools' reused class names. */
  .app-header  { view-transition-name: vt-header; }
  .lede        { view-transition-name: vt-lede; }
  .page-footer { view-transition-name: vt-footer; }

  .lede {
    margin: 14px 0 0;
    max-width: 46ch;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.5;
  }

  /* ───── Tool grid — auto-fills as more tools are added ───── */
  .tool-grid {
    margin-top: 44px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .tool-card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-card);
    text-decoration: none;
    color: inherit;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .tool-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    border-color: var(--border-2);
  }
  .tool-card:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  .tool-icon {
    width: 48px;
    height: 48px;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    overflow: hidden;
    background: var(--track);
    color: var(--ink);
  }
  /* Tool icons are full-bleed 80×80 tiles (own background), scaled into the plate. */
  .tool-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .tool-title {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.25;
  }
  .tool-desc {
    margin: 0;
    color: var(--muted);
    font-size: 13.5px;
    font-weight: 400;
    line-height: 1.5;
  }

  .tool-cta {
    margin-top: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: color .18s ease;
  }
  .tool-card:hover .tool-cta { color: var(--accent); }
  .tool-cta svg {
    width: 16px; height: 16px;
    transition: transform .18s ease;
  }
  .tool-card:hover .tool-cta svg { transform: translateX(3px); }

  /* "Coming soon" placeholder card — non-interactive, signals the launcher grows */
  .tool-card.is-soon {
    border-style: dashed;
    box-shadow: none;
    background: transparent;
    color: var(--muted);
    cursor: default;
  }
  .tool-card.is-soon:hover { transform: none; box-shadow: none; border-color: var(--border-2); }
  .tool-card.is-soon .tool-icon { background: transparent; border: 1px dashed var(--border-2); }
  .tool-card.is-soon:hover .tool-icon { background: transparent; color: var(--muted); }
  .tool-card.is-soon .tool-cta { color: var(--muted); }

  /* ───── Footer ───── */
  .page-footer {
    flex: 0 0 auto;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-weight: 400;
  }
  .page-footer a { color: var(--muted); text-decoration: none; }
  .page-footer a:hover { color: var(--ink); text-decoration: underline; }

  /* ───── Responsive ───── */
  @media (max-width: 600px) {
    .page { padding: 40px 18px 32px; }
    .app-header { font-size: 27.5px; }
    .brand-face { height: 42.5px; }
    .tool-grid { margin-top: 32px; gap: 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
    .tool-card:hover { transform: none; }
    .tool-card:hover .tool-cta svg { transform: none; }
  }
</style>
</head>
<body>
  <main class="page">
    <h1 class="app-header">
      <img class="brand-face" src="assets/onu-sano-face.svg" alt="" aria-hidden="true">
      <span class="brand-name">Onu Sano®</span>
      <span class="brand-sub">Tööriistad</span>
    </h1>
    <p class="lede">Vali tööriist, millega soovid tööd alustada.</p>

    <div class="tool-grid" id="toolGrid"></div>
  </main>

  <footer class="page-footer">
    © <span id="year"></span> Onu Sano® · Delfi Meedia
  </footer>

  <!-- Line icon used by the card CTA arrow. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <g id="ico-arrow">
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </g>
    </defs>
  </svg>

  <script>
    /* ───────────────────────────────────────────────────────────
       TOOLS — the single source of truth for the launcher.
       To add a tool: append one object here. No other edits needed.
         name : shown as the card title
         desc : one-line Estonian description
         href : path to the tool (relative to this folder)
         icon : path to the tool's icon image (80×80 tile, relative to this folder)
       ─────────────────────────────────────────────────────────── */
    const TOOLS = [
      {
        name: "A&S Video editor",
        desc: "Laadi üles video, lisa tekstikihid ja ekspordi sissepõletatud tekstiga — Instagrami-valmis formaatides.",
        href: "as-video-editor/index.html",
        icon: "assets/icons/annestiil.svg",
      },
      {
        name: "Podcast framer",
        desc: "Aseta foto branditud raami taha, kadreeri ja ekspordi täpne 1920×1080 PNG kaanepilt.",
        href: "podcast/index.html",
        icon: "assets/icons/podcast.svg",
      },
      {
        name: "Geenius social",
        desc: "Koosta Geeniuse sotsiaalmeedia graafika mallidest ja ekspordi valmis pildina (1080×1920 või 1200×1200).",
        href: "geenius-social/index.html",
        icon: "assets/icons/geenius.svg",
      },
    ];

    const grid = document.getElementById("toolGrid");
    const svgNS = "http://www.w3.org/2000/svg";

    function lineSvg(symbolId) {
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("fill", "none");
      svg.setAttribute("stroke", "currentColor");
      svg.setAttribute("stroke-width", "2");
      svg.setAttribute("stroke-linecap", "round");
      svg.setAttribute("stroke-linejoin", "round");
      svg.setAttribute("aria-hidden", "true");
      const use = document.createElementNS(svgNS, "use");
      use.setAttribute("href", "#" + symbolId);
      svg.appendChild(use);
      return svg;
    }

    for (const tool of TOOLS) {
      const card = document.createElement("a");
      card.className = "tool-card";
      card.href = encodeURI(tool.href);

      const icon = document.createElement("div");
      icon.className = "tool-icon";
      const iconImg = document.createElement("img");
      iconImg.src = encodeURI(tool.icon);
      iconImg.alt = "";
      icon.appendChild(iconImg);

      const title = document.createElement("h2");
      title.className = "tool-title";
      title.textContent = tool.name;

      const desc = document.createElement("p");
      desc.className = "tool-desc";
      desc.textContent = tool.desc;

      const cta = document.createElement("span");
      cta.className = "tool-cta";
      cta.append("Ava tööriist");
      cta.appendChild(lineSvg("ico-arrow"));

      card.append(icon, title, desc, cta);
      grid.appendChild(card);
    }

    /* Trailing dashed "coming soon" tile — a visible promise that the set grows. */
    const soon = document.createElement("div");
    soon.className = "tool-card is-soon";
    soon.setAttribute("aria-hidden", "true");
    const soonIcon = document.createElement("div");
    soonIcon.className = "tool-icon";
    soonIcon.textContent = "+";
    soonIcon.style.fontSize = "24px";
    soonIcon.style.fontWeight = "300";
    const soonTitle = document.createElement("h2");
    soonTitle.className = "tool-title";
    soonTitle.textContent = "Tuleb veel";
    const soonDesc = document.createElement("p");
    soonDesc.className = "tool-desc";
    soonDesc.textContent = "Uued Onu Sano® tööriistad lisanduvad siia.";
    soon.append(soonIcon, soonTitle, soonDesc);
    grid.appendChild(soon);

    /* Name each card so it animates independently in the page transition
       (staggered down on exit, up on return). Capped to the delays defined
       in assets/transition.css; any extra cards just ride the root animation. */
    document.querySelectorAll(".tool-card").forEach((card, i) => {
      if (i < 12) card.style.viewTransitionName = "vt-card-" + i;
    });

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
