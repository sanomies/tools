<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onu Sano · Tööriistad</title>
<meta name="description" content="Onu Sano tööriistad — vali tööriist, mida soovid kasutada.">
<meta property="og:title" content="Onu Sano · Tööriistad">
<meta property="og:description" content="Onu Sano tööriistad — vali tööriist, mida soovid kasutada.">
<link rel="icon" href="assets/icon-1024x1024px.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ─────────────────────────────────────────────────────────────
     Onu Sano · Tööriistad — tool launcher
     House style borrowed from the Podcast framer (Delfi light theme):
     near-white textured base, white cards, near-black ink, Delfi-red
     accent reserved for hover/selection. One family: Google Sans Flex.
     ───────────────────────────────────────────────────────────── */
  :root {
    --bg:           #fbfbfc;   /* app base behind the soft texture */
    --card:         #ffffff;   /* card / panel surface */
    --border:       #ebebeb;   /* card hairline */
    --border-2:     #dedfe0;   /* stronger hairline */
    --ink:          #111317;   /* near-black: headings + solid fills */
    --muted:        #708597;   /* delfi-darkgray: secondary text */
    --track:        #edf2f4;   /* delfi-lightgray: icon plate fill */
    --hover:        #f2f4f6;   /* subtle hover wash */
    --accent:       #000000;   /* hover + selection chrome + transition panel */
    --focus:        #000000;   /* keyboard focus ring */
    --shadow-card:  0 4px 5px rgba(0,0,0,0.10);
    --shadow-hover: 0 10px 28px rgba(17,19,23,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: "Google Sans Flex", "Google Sans", "Product Sans", "DM Sans",
                 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink);
    color-scheme: light;
    background-color: var(--bg);
    background-image: url("assets/bg-texture.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ───── Page shell ───── */
  .page {
    flex: 1 1 auto;
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    padding: 64px 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ───── Brand header (shared pattern: face · Onu Sano® · sub) ───── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 0;
    font-size: 26px;
    line-height: 1.2;
    font-weight: 400;
  }
  .brand-face { height: 40px; width: auto; display: block; }
  .brand-name { font-weight: 700; }
  .brand-sub  { font-weight: 300; }

  .lede {
    margin: 14px 0 0;
    max-width: 46ch;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.5;
  }

  /* ───── Tool grid — auto-fills as more tools are added ───── */
  .tool-grid {
    margin-top: 44px;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .tool-card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-card);
    text-decoration: none;
    color: inherit;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .tool-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    border-color: var(--border-2);
  }
  .tool-card:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  .tool-icon {
    width: 48px;
    height: 48px;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: var(--track);
    color: var(--ink);
    transition: background .18s ease, color .18s ease;
  }
  .tool-card:hover .tool-icon { background: var(--accent); color: #fff; }
  .tool-icon svg { width: 24px; height: 24px; }

  .tool-title {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.25;
  }
  .tool-desc {
    margin: 0;
    color: var(--muted);
    font-size: 13.5px;
    font-weight: 400;
    line-height: 1.5;
  }

  .tool-cta {
    margin-top: auto;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: color .18s ease;
  }
  .tool-card:hover .tool-cta { color: var(--accent); }
  .tool-cta svg {
    width: 16px; height: 16px;
    transition: transform .18s ease;
  }
  .tool-card:hover .tool-cta svg { transform: translateX(3px); }

  /* "Coming soon" placeholder card — non-interactive, signals the launcher grows */
  .tool-card.is-soon {
    border-style: dashed;
    box-shadow: none;
    background: transparent;
    color: var(--muted);
    cursor: default;
  }
  .tool-card.is-soon:hover { transform: none; box-shadow: none; border-color: var(--border-2); }
  .tool-card.is-soon .tool-icon { background: transparent; border: 1px dashed var(--border-2); }
  .tool-card.is-soon:hover .tool-icon { background: transparent; color: var(--muted); }
  .tool-card.is-soon .tool-cta { color: var(--muted); }

  /* ───── Footer ───── */
  .page-footer {
    flex: 0 0 auto;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-weight: 400;
  }
  .page-footer a { color: var(--muted); text-decoration: none; }
  .page-footer a:hover { color: var(--ink); text-decoration: underline; }

  /* ───── Responsive ───── */
  /* ───── Page-open wipe — a branded panel slides in to cover the page,
     then the chosen tool loads behind it. Driven by JS (.is-active). ───── */
  .page-wipe {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(100%);
    pointer-events: none;
    transition: transform .45s cubic-bezier(.4, 0, .2, 1);
  }
  .page-wipe.is-active { transform: translateX(0); }
  /* Used to jump the panel to its covering state without animating, so the
     Back-button reverse can start from "covered" and only animate sliding out. */
  .page-wipe.no-anim, .page-wipe.no-anim .page-wipe-face { transition: none !important; }
  .page-wipe-face {
    width: 96px;
    height: auto;
    /* Original face colors, lifted off the dark panel by a 2px white outline. */
    filter:
      drop-shadow( 2px 0 0 #fff) drop-shadow(-2px 0 0 #fff)
      drop-shadow( 0 2px 0 #fff) drop-shadow( 0 -2px 0 #fff)
      drop-shadow( 1.4px 1.4px 0 #fff) drop-shadow(-1.4px 1.4px 0 #fff)
      drop-shadow( 1.4px -1.4px 0 #fff) drop-shadow(-1.4px -1.4px 0 #fff);
    opacity: 0;
    transform: scale(.94);
    transition: opacity .25s ease .12s, transform .25s ease .12s;
  }
  .page-wipe.is-active .page-wipe-face { opacity: 1; transform: scale(1); }

  @media (max-width: 600px) {
    .page { padding: 40px 18px 32px; }
    .app-header { font-size: 22px; }
    .brand-face { height: 34px; }
    .tool-grid { margin-top: 32px; gap: 14px; }
    .page-wipe-face { width: 76px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
    .tool-card:hover { transform: none; }
    .tool-card:hover .tool-cta svg { transform: none; }
    .page-wipe { transition: none; }
  }
</style>
</head>
<body>
  <main class="page">
    <h1 class="app-header">
      <img class="brand-face" src="assets/onu-sano-face.svg" alt="" aria-hidden="true">
      <span class="brand-name">Onu Sano®</span>
      <span class="brand-sub">Tööriistad</span>
    </h1>
    <p class="lede">Vali tööriist, millega soovid tööd alustada.</p>

    <div class="tool-grid" id="toolGrid"></div>
  </main>

  <footer class="page-footer">
    © <span id="year"></span> Onu Sano® · Delfi Meedia
  </footer>

  <!-- Branded transition panel; slides in over the page when a tool is opened. -->
  <div class="page-wipe" id="pageWipe" aria-hidden="true">
    <img class="page-wipe-face" src="assets/onu-sano-face.svg" alt="">
  </div>

  <!-- Lucide-style line icons, referenced by id from the TOOLS data below -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <g id="ico-video">
        <path d="m22 8-6 4 6 4V8Z"/>
        <rect x="2" y="6" width="14" height="12" rx="2"/>
      </g>
      <g id="ico-frame">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="9" cy="9" r="2"/>
        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
      </g>
      <g id="ico-layout">
        <rect x="3" y="3" width="18" height="7" rx="1"/>
        <rect x="3" y="14" width="9" height="7" rx="1"/>
        <rect x="16" y="14" width="5" height="7" rx="1"/>
      </g>
      <g id="ico-arrow">
        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
      </g>
    </defs>
  </svg>

  <script>
    /* ───────────────────────────────────────────────────────────
       TOOLS — the single source of truth for the launcher.
       To add a tool: append one object here. No other edits needed.
         name : shown as the card title
         desc : one-line Estonian description
         href : path to the tool (relative to this folder)
         icon : id of an <svg> symbol defined in the <defs> above
       ─────────────────────────────────────────────────────────── */
    const TOOLS = [
      {
        name: "A&S Video editor",
        desc: "Laadi üles video, lisa tekstikihid ja ekspordi sissepõletatud tekstiga — Instagrami-valmis formaatides.",
        href: "as-video-editor/index.html",
        icon: "ico-video",
      },
      {
        name: "Podcast framer",
        desc: "Aseta foto branditud raami taha, kadreeri ja ekspordi täpne 1920×1080 PNG kaanepilt.",
        href: "podcast/index.html",
        icon: "ico-frame",
      },
      {
        name: "Geenius social",
        desc: "Koosta Geeniuse sotsiaalmeedia graafika mallidest ja ekspordi valmis pildina (1080×1920 või 1200×1200).",
        href: "geenius-social/index.html",
        icon: "ico-layout",
      },
    ];

    const grid = document.getElementById("toolGrid");
    const svgNS = "http://www.w3.org/2000/svg";
    const wipe = document.getElementById("pageWipe");
    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)");

    /* Play the branded wipe, then navigate. Falls back to plain navigation when the
       user wants a new tab/window, on non-left clicks, or under reduced-motion. */
    function openTool(e, href) {
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      if (prefersReduced.matches) return;
      e.preventDefault();
      let navigated = false;
      const go = () => {
        if (navigated) return;
        navigated = true;
        wipe.removeEventListener("transitionend", onEnd);
        window.location.href = href;
      };
      // Wait for the panel's own slide to finish — ignore the bubbling face fade.
      const onEnd = (ev) => {
        if (ev.target === wipe && ev.propertyName === "transform") go();
      };
      wipe.addEventListener("transitionend", onEnd);
      setTimeout(go, 600); // fallback if transitionend never fires
      wipe.classList.add("is-active");
    }

    function lineSvg(symbolId) {
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("fill", "none");
      svg.setAttribute("stroke", "currentColor");
      svg.setAttribute("stroke-width", "2");
      svg.setAttribute("stroke-linecap", "round");
      svg.setAttribute("stroke-linejoin", "round");
      svg.setAttribute("aria-hidden", "true");
      const use = document.createElementNS(svgNS, "use");
      use.setAttribute("href", "#" + symbolId);
      svg.appendChild(use);
      return svg;
    }

    for (const tool of TOOLS) {
      const card = document.createElement("a");
      card.className = "tool-card";
      card.href = encodeURI(tool.href);
      card.addEventListener("click", (e) => openTool(e, card.href));

      const icon = document.createElement("div");
      icon.className = "tool-icon";
      icon.appendChild(lineSvg(tool.icon));

      const title = document.createElement("h2");
      title.className = "tool-title";
      title.textContent = tool.name;

      const desc = document.createElement("p");
      desc.className = "tool-desc";
      desc.textContent = tool.desc;

      const cta = document.createElement("span");
      cta.className = "tool-cta";
      cta.append("Ava tööriist");
      cta.appendChild(lineSvg("ico-arrow"));

      card.append(icon, title, desc, cta);
      grid.appendChild(card);
    }

    /* Trailing dashed "coming soon" tile — a visible promise that the set grows. */
    const soon = document.createElement("div");
    soon.className = "tool-card is-soon";
    soon.setAttribute("aria-hidden", "true");
    const soonIcon = document.createElement("div");
    soonIcon.className = "tool-icon";
    soonIcon.textContent = "+";
    soonIcon.style.fontSize = "24px";
    soonIcon.style.fontWeight = "300";
    const soonTitle = document.createElement("h2");
    soonTitle.className = "tool-title";
    soonTitle.textContent = "Tuleb veel";
    const soonDesc = document.createElement("p");
    soonDesc.className = "tool-desc";
    soonDesc.textContent = "Uued Onu Sano® tööriistad lisanduvad siia.";
    soon.append(soonIcon, soonTitle, soonDesc);
    grid.appendChild(soon);

    document.getElementById("year").textContent = new Date().getFullYear();

    /* When the user returns via Back/Forward (incl. bfcache restore), play the
       transition in reverse: start covered, then slide the panel back out. */
    function reverseWipeOut() {
      wipe.classList.add("no-anim", "is-active"); // jump to covered, no animation
      void wipe.offsetWidth;                      // commit that state
      wipe.classList.remove("no-anim");           // re-enable transitions
      requestAnimationFrame(() =>
        requestAnimationFrame(() => wipe.classList.remove("is-active"))); // slide out
    }
    window.addEventListener("pageshow", (e) => {
      const nav = performance.getEntriesByType("navigation")[0];
      const isBack = e.persisted || (nav && nav.type === "back_forward");
      if (isBack && !prefersReduced.matches) reverseWipeOut();
      else wipe.classList.remove("is-active"); // fresh load: ensure panel is hidden
    });
  </script>
</body>
</html>
