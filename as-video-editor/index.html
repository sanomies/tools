    const hex = parseHex(ttColorHex.value);
    if (hex) { ttColor.value = hex; apply(l => l.color = hex); }
  });
  ttColorHex.addEventListener('blur', () => { ttColorHex.value = fmtHex(ttColor.value); });
  ttColorHex.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); ttColorHex.blur(); } });
  ttAlign.addEventListener('click', e => {
    const b = e.target.closest('.tt-btn'); if (!b) return;
    apply(l => setLayerAlign(l, b.dataset.v));
  });
}

// ═════════════════════════════════════ Smart guides (snap to canvas edges/centre) ═════════════════════════════════════
function showGuideV(canvasX) {
  guideV.style.left = (canvasX * viewScale) + 'px';
  guideV.classList.remove('hidden');
}
function showGuideH(canvasY) {
  guideH.style.top = (canvasY * viewScale) + 'px';
  guideH.classList.remove('hidden');
}
function hideGuideV() { guideV.classList.add('hidden'); }
function hideGuideH() { guideH.classList.add('hidden'); }
function hideGuides() { hideGuideV(); hideGuideH(); }

// ─── Undo / redo ─────────────────────────────────────────────────────────
// Snapshots capture the WHOLE document — every per-format slot, the active
// size, and the trim range. Selection state is ephemeral and not stored, so
// undoing also clears selection (predictable: same as reload-and-pick-up).
const undoStack = [];
const redoStack = [];
const UNDO_MAX = 100;
const UNDO_DEBOUNCE_MS = 600;
let lastUndoKey = null;
let lastUndoTime = 0;

function snapshotDoc() {
  // Flush working state into its slot first so it's captured.
  saveCurrentFormatSlot();
  return {
    sizeId:           state.sizeId,
    formats:          JSON.parse(JSON.stringify(state.formats)),
    trimStart:        state.trimStart,
    trimEnd:          state.trimEnd,
    masterFormat:     state.masterFormat,
    // Selection is part of the user's editing context — undo/redo should
    // restore the same set of selected items so the next action lands on
    // what they expect.
    selection: {
      videoSelected:    state.videoSelected,
      activeLayerId:    state.activeLayerId,
      selectedLayerIds: state.selectedLayerIds.slice(),
    },
  };
}
function restoreSnapshot(snap) {
  state.sizeId       = snap.sizeId;
  state.formats      = JSON.parse(JSON.stringify(snap.formats));
  state.trimStart    = snap.trimStart;
  state.trimEnd      = snap.trimEnd;
  state.masterFormat = snap.masterFormat || null;
  const slot = state.formats[state.sizeId] || (state.formats[state.sizeId] = { layers: [], videoTransform: null });
  state.layers          = slot.layers;
  state.video.transform = slot.videoTransform;
  // Restore selection, but only ids that still exist in the current slot.
  const sel = snap.selection || { videoSelected: false, activeLayerId: null, selectedLayerIds: [] };
  const exist = new Set(state.layers.map(l => l.id));
  state.selectedLayerIds = sel.selectedLayerIds.filter(id => exist.has(id));
  state.activeLayerId   = exist.has(sel.activeLayerId) ? sel.activeLayerId : (state.selectedLayerIds[state.selectedLayerIds.length - 1] || null);
  state.videoSelected   = !!sel.videoSelected;
  sizeGrid.querySelectorAll('.size-card').forEach(b => {
    const on = b.dataset.id === state.sizeId;
    b.classList.toggle('active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  applySizeToCanvas();
  refreshLayerList();
  syncEditPanel();
  updateVideoChrome();
  updateTextToolbar();
  updateTrimOverlay();
  draw();
  // Reset debounce window so the next user edit pushes a fresh entry.
  lastUndoKey = null; lastUndoTime = 0;
}

// `key` collapses consecutive same-keyed edits (e.g. dragging a slider)
// into one undo entry within UNDO_DEBOUNCE_MS. Omit `key` to never collapse.
function pushUndo(key) {
  const now = Date.now();
  if (key && key === lastUndoKey && (now - lastUndoTime) < UNDO_DEBOUNCE_MS) {
    lastUndoTime = now;
    return;
  }
  undoStack.push(snapshotDoc());
  if (undoStack.length > UNDO_MAX) undoStack.shift();
  redoStack.length = 0;
  lastUndoKey = key || null;
  lastUndoTime = now;
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(snapshotDoc());
  restoreSnapshot(undoStack.pop());
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(snapshotDoc());
  restoreSnapshot(redoStack.pop());
}

// ─── Generalized snap targets ───────────────────────────────────────────
// excludeId: 'video' to exclude the video transform; otherwise a layer id.
// Returns the X- and Y-axis line positions that the moving/resizing element
// should snap to: canvas edges + center, every other layer's left/centre/
// right (or top/middle/bottom), and the video's edges if not excluded.
// excludeId can be a single id string ('video' or a layer id) OR a Set of
// ids to exclude (used when snapping a multi-selection: every selected
// layer is excluded so the group doesn't snap to itself).
function _isExcluded(exclude, id) {
  return exclude instanceof Set ? exclude.has(id) : exclude === id;
}
function getXSnapTargets(exclude) {
  const sz = activeSize();
  const out = [0, sz.w / 2, sz.w];
  for (const l of state.layers) {
    if (!l._bbox || _isExcluded(exclude, l.id)) continue;
    const b = l._bbox;
    out.push(b.x, b.x + b.w / 2, b.x + b.w);
  }
  if (!_isExcluded(exclude, 'video') && state.video.transform) {
    const t = state.video.transform;
    out.push(t.x, t.x + t.w / 2, t.x + t.w);
  }
  return out;
}
function getYSnapTargets(exclude) {
  const sz = activeSize();
  const out = [0, sz.h / 2, sz.h];
  for (const l of state.layers) {
    if (!l._bbox || _isExcluded(exclude, l.id)) continue;
    const b = l._bbox;
    out.push(b.y, b.y + b.h / 2, b.y + b.h);
  }
  if (!_isExcluded(exclude, 'video') && state.video.transform) {
    const t = state.video.transform;
    out.push(t.y, t.y + t.h / 2, t.y + t.h);
  }
  return out;
}

// Snap a bbox's left/centre/right (X) and top/middle/bottom (Y) to the
// nearest targets within SNAP. `exclude` may be a single id or a Set.
// Returns { bestX, bestY } with { cur, v } or null per axis.
function snapBboxMove(bbox, exclude) {
  const xs = getXSnapTargets(exclude);
  const ys = getYSnapTargets(exclude);
  const candX = [bbox.x, bbox.x + bbox.w / 2, bbox.x + bbox.w];
  const candY = [bbox.y, bbox.y + bbox.h / 2, bbox.y + bbox.h];
  let bestX = null, bestXd = SNAP;
  for (const cx of candX) for (const tx of xs) {
    const d = Math.abs(cx - tx);
    if (d < bestXd) { bestXd = d; bestX = { cur: cx, v: tx }; }
  }
  let bestY = null, bestYd = SNAP;
  for (const cy of candY) for (const ty of ys) {
    const d = Math.abs(cy - ty);
    if (d < bestYd) { bestYd = d; bestY = { cur: cy, v: ty }; }
  }
  return { bestX, bestY };
}

// Multi-selection move: snap the union bbox against everything that isn't
// in the selection (canvas + non-selected layers + video). Returns the
// shift {dx, dy} so the caller can apply it to every selected layer
// uniformly — keeping their relative spacing intact while the group as a
// whole locks to a guide.
function snapMoveSelectionDelta() {
  if (state.selectedLayerIds.length < 2) return { dx: 0, dy: 0 };
  const union = computeUnionBbox(state.selectedLayerIds);
  if (!union.w || !union.h) { hideGuides(); return { dx: 0, dy: 0 }; }
  const excludeSet = new Set(state.selectedLayerIds);
  const { bestX, bestY } = snapBboxMove(union, excludeSet);
  if (bestX) showGuideV(bestX.v); else hideGuideV();
  if (bestY) showGuideH(bestY.v); else hideGuideH();
  return {
    dx: bestX ? (bestX.v - bestX.cur) : 0,
    dy: bestY ? (bestY.v - bestY.cur) : 0,
  };
}

function applySnapMove() {
  const t = state.video.transform;
  const { bestX, bestY } = snapBboxMove({ x: t.x, y: t.y, w: t.w, h: t.h }, 'video');
  if (bestX) { t.x += (bestX.v - bestX.cur); showGuideV(bestX.v); } else hideGuideV();
  if (bestY) { t.y += (bestY.v - bestY.cur); showGuideH(bestY.v); } else hideGuideH();
}

// Snap a text/rect layer based on its rendered bbox. Shifts the layer's
// anchor (layer.x / layer.y) by the same delta so the bbox follows.
function applySnapMoveLayer(layer) {
  const b = layer._bbox;
  if (!b) { hideGuides(); return; }
  const { bestX, bestY } = snapBboxMove(b, layer.id);
  if (bestX) { layer.x += (bestX.v - bestX.cur); showGuideV(bestX.v); } else hideGuideV();
  if (bestY) { layer.y += (bestY.v - bestY.cur); showGuideH(bestY.v); } else hideGuideH();
}

// Smallest axis-aligned bbox covering every layer in `ids`. Falls back to
// a zero-area rect at the canvas origin if no layer has a usable bbox.
function computeUnionBbox(ids) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const id of ids) {
    const l = state.layers.find(x => x.id === id);
    if (!l || !l._bbox) continue;
    if (l._bbox.x < minX) minX = l._bbox.x;
    if (l._bbox.y < minY) minY = l._bbox.y;
    if (l._bbox.x + l._bbox.w > maxX) maxX = l._bbox.x + l._bbox.w;
    if (l._bbox.y + l._bbox.h > maxY) maxY = l._bbox.y + l._bbox.h;
  }
  if (!isFinite(minX)) return { x: 0, y: 0, w: 0, h: 0 };
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

// World-space anchor for resizing a ROTATED layer. After the resize logic
// anchors the opposite corner in LOCAL coords, the bbox centre has moved,
// which (under the layer's rotation around its centre) shifts that corner
// in WORLD space. Translate layer.x/y so the opposite corner ends up at
// the same world position it started at — making the visual drag feel
// the same as it would on an unrotated layer.
function applyRotatedWorldAnchor(layer, startBbox, corner, rotDeg) {
  if (!layer._bbox) return;
  const r = rotDeg * Math.PI / 180;
  const opp = (function () {
    // Opposite of the dragged handle (for edges, the midpoint of the
    // opposite edge; for corners, the diagonally opposite corner).
    if (corner === 'n')  return { kx: 0.5, ky: 1 };
    if (corner === 's')  return { kx: 0.5, ky: 0 };
    if (corner === 'w')  return { kx: 1,   ky: 0.5 };
    if (corner === 'e')  return { kx: 0,   ky: 0.5 };
    return {
      kx: corner.includes('w') ? 1 : 0,
      ky: corner.includes('n') ? 1 : 0,
    };
  })();
  const oldOpp = { x: startBbox.x + startBbox.w * opp.kx, y: startBbox.y + startBbox.h * opp.ky };
  const oldC   = { x: startBbox.x + startBbox.w / 2,      y: startBbox.y + startBbox.h / 2 };
  const oldDx = oldOpp.x - oldC.x, oldDy = oldOpp.y - oldC.y;
  const oldWorld = { x: oldC.x + oldDx * Math.cos(r) - oldDy * Math.sin(r),
                     y: oldC.y + oldDx * Math.sin(r) + oldDy * Math.cos(r) };

  const nb = layer._bbox;
  const newOpp = { x: nb.x + nb.w * opp.kx, y: nb.y + nb.h * opp.ky };
  const newC   = { x: nb.x + nb.w / 2,      y: nb.y + nb.h / 2 };
  const newDx = newOpp.x - newC.x, newDy = newOpp.y - newC.y;
  const newWorld = { x: newC.x + newDx * Math.cos(r) - newDy * Math.sin(r),
                     y: newC.y + newDx * Math.sin(r) + newDy * Math.cos(r) };

  layer.x += (oldWorld.x - newWorld.x);
  layer.y += (oldWorld.y - newWorld.y);
}

// Snap while a new shape is being drawn with the rect/text tool. The
// origin corner is fixed; the cursor corner moves. We snap the moving
// edges (x and y) to the nearest target. Works for both kinds — text uses
// maxWidth/boxHeight, rect uses w/h.
function snapToolDraw(layer, originX, originY, ptX, ptY) {
  const b = layer._bbox;
  if (!b) { hideGuides(); return; }
  const movX = ptX < originX ? 'left' : 'right';
  const movY = ptY < originY ? 'top'  : 'bottom';
  const xs = getXSnapTargets(layer.id);
  const ys = getYSnapTargets(layer.id);
  hideGuides();
  const setW = (l, w) => { if (l.kind === 'rect' || l.kind === 'image') l.w = w; else l.maxWidth  = w; };
  const setH = (l, h) => { if (l.kind === 'rect' || l.kind === 'image') l.h = h; else l.boxHeight = h; };

  const curX = movX === 'left' ? b.x : b.x + b.w;
  let bestX = null, bestXd = SNAP;
  for (const t of xs) { const d = Math.abs(curX - t); if (d < bestXd) { bestXd = d; bestX = t; } }
  if (bestX !== null) {
    if (movX === 'left') {
      const right = b.x + b.w;
      const newW = Math.max(2, right - bestX);
      layer.x = bestX;
      setW(layer, newW);
    } else {
      const newW = Math.max(2, bestX - layer.x);
      setW(layer, newW);
    }
    showGuideV(bestX);
  }
  const curY = movY === 'top' ? b.y : b.y + b.h;
  let bestY = null, bestYd = SNAP;
  for (const t of ys) { const d = Math.abs(curY - t); if (d < bestYd) { bestYd = d; bestY = t; } }
  if (bestY !== null) {
    if (movY === 'top') {
      const bottom = b.y + b.h;
      const newH = Math.max(2, bottom - bestY);
      layer.y = bestY;
      setH(layer, newH);
    } else {
      const newH = Math.max(2, bestY - layer.y);
      setH(layer, newH);
    }
    showGuideH(bestY);
  }
}

// Snap a rect layer being resized: snap the moving edge(s) to the nearest
// guide. Free aspect (no ratio lock) — adjusts the corresponding dimension
// independently per axis.
function applySnapResizeRect(layer, corner) {
  hideGuides();
  const xs = getXSnapTargets(layer.id);
  const ys = getYSnapTargets(layer.id);
  const MIN = 8;
  let movX = null, movY = null;
  if (corner.includes('w')) movX = 'left'; else if (corner.includes('e')) movX = 'right';
  if (corner.includes('n')) movY = 'top';  else if (corner.includes('s')) movY = 'bottom';
  // Generic width/height accessors — also covers text-with-box (maxWidth/boxHeight).
  const hasDirectWH = layer.kind === 'rect' || layer.kind === 'image';
  const getW = () => hasDirectWH ? layer.w : (layer.maxWidth  || 0);
  const getH = () => hasDirectWH ? layer.h : (layer.boxHeight || 0);
  const setW = (w) => { if (hasDirectWH) layer.w = w; else layer.maxWidth  = w; };
  const setH = (h) => { if (hasDirectWH) layer.h = h; else layer.boxHeight = h; };

  if (movX) {
    const cur = movX === 'left' ? layer.x : layer.x + getW();
    let bestT = null, bestD = SNAP;
    for (const t of xs) { const d = Math.abs(cur - t); if (d < bestD) { bestD = d; bestT = t; } }
    if (bestT !== null) {
      if (movX === 'left') {
        const right = layer.x + getW();
        const newW = right - bestT;
        if (newW >= MIN) { layer.x = bestT; setW(newW); showGuideV(bestT); }
      } else {
        const newW = bestT - layer.x;
        if (newW >= MIN) { setW(newW); showGuideV(bestT); }
      }
    }
  }
  if (movY) {
    const cur = movY === 'top' ? layer.y : layer.y + getH();
    let bestT = null, bestD = SNAP;
    for (const t of ys) { const d = Math.abs(cur - t); if (d < bestD) { bestD = d; bestT = t; } }
    if (bestT !== null) {
      if (movY === 'top') {
        const bottom = layer.y + getH();
        const newH = bottom - bestT;
        if (newH >= MIN) { layer.y = bestT; setH(newH); showGuideH(bestT); }
      } else {
        const newH = bestT - layer.y;
        if (newH >= MIN) { setH(newH); showGuideH(bestT); }
      }
    }
  }
}

function applySnapResize(corner, alt) {
  hideGuides();
  const t = state.video.transform;
  const sz = activeSize();
  const ratio = t.w / t.h;
  const MIN = MIN_VIDEO_SIZE;
  const curLeft = t.x, curRight = t.x + t.w, curTop = t.y, curBottom = t.y + t.h;
  const curCx = (curLeft + curRight) / 2, curCy = (curTop + curBottom) / 2;

  let movX = null, movY = null;
  if (corner.includes('w')) movX = 'left'; else if (corner.includes('e')) movX = 'right';
  if (corner.includes('n')) movY = 'top';  else if (corner.includes('s')) movY = 'bottom';

  // Snap targets are now generalized — canvas edges/centre PLUS every layer's
  // bbox edges/centre, so the video aligns to rectangles/text too.
  const xTargets = getXSnapTargets('video');
  const yTargets = getYSnapTargets('video');

  let bestX = null, bestXd = SNAP;
  if (movX) { const v = movX === 'left' ? curLeft : curRight; for (const tg of xTargets) { const d = Math.abs(v - tg); if (d < bestXd) { bestXd = d; bestX = tg; } } }
  let bestY = null, bestYd = SNAP;
  if (movY) { const v = movY === 'top' ? curTop : curBottom; for (const tg of yTargets) { const d = Math.abs(v - tg); if (d < bestYd) { bestYd = d; bestY = tg; } } }
  let snapX = bestX, snapY = bestY;
  if (corner.length === 2 && snapX !== null && snapY !== null) {
    if (bestXd <= bestYd) snapY = null; else snapX = null;
  }
  if (snapX !== null) {
    const newW = alt ? Math.max(MIN, Math.abs(curCx - snapX) * 2) : (movX === 'left' ? curRight - snapX : snapX - curLeft);
    if (newW >= MIN) {
      const newH = newW / ratio;
      if (alt) t.x = curCx - newW / 2; else if (movX === 'left') t.x = snapX; else t.x = curLeft;
      if (alt) t.y = curCy - newH / 2; else if (corner.length === 1) t.y = curCy - newH / 2; else t.y = movY === 'top' ? curBottom - newH : curTop;
      t.w = newW; t.h = newH;
      showGuideV(snapX);
    }
  }
  if (snapY !== null) {
    const newH = alt ? Math.max(MIN / ratio, Math.abs(curCy - snapY) * 2) : (movY === 'top' ? curBottom - snapY : snapY - curTop);
    if (newH >= MIN / ratio) {
      const newW = newH * ratio;
      if (alt) t.y = curCy - newH / 2; else if (movY === 'top') t.y = snapY; else t.y = curTop;
      if (alt) t.x = curCx - newW / 2; else if (corner.length === 1) t.x = curCx - newW / 2; else t.x = movX === 'left' ? curRight - newW : curLeft;
      t.w = newW; t.h = newH;
      showGuideH(snapY);
    }
  }
}

// ─── Tools ──────────────────────────────────────────────────────────────
// Active tool drives the canvas cursor and what a pointerdown on the canvas
// means. After a draw, we revert to 'select' so the user can immediately
// edit / move the new layer (Figma behavior).
function setTool(name) {
  state.tool = name;
  toolSelectBtn.classList.toggle('active', name === 'select');
  toolTextBtn.classList.toggle('active',  name === 'text');
  toolRectBtn.classList.toggle('active',  name === 'rect');
  canvas.classList.toggle('tool-text', name === 'text');
  canvas.classList.toggle('tool-rect', name === 'rect');
  // Stepping into a draw tool clears any selection so the new shape is the
  // sole focus of the next pointerdown.
  if (name !== 'select') deselectAll();
}

// ═════════════════════════════════════ Canvas pointer (layer or video selection + drag) ═════════════════════════════════════
canvas.addEventListener('pointerdown', e => {
  // If the user is mid-inline-edit and they click on the canvas, commit the
  // edit and hand selection back to the video (if one is loaded) — otherwise
  // just clear selection.
  if (inlineEditingLayerId) {
    endInlineEdit();
    if (state.video.loaded) selectVideo(); else deselectAll();
    e.preventDefault();
    return;
  }

  const pt = screenToCanvas(e.clientX, e.clientY);

  // 0) Active draw tool — create a shape rooted at the click, then drag
  //    to size; on pointerup, single-click vs drag is resolved.
  if (state.tool === 'rect') { startRectDraw(e, pt); return; }
  if (state.tool === 'text') { startTextDraw(e, pt); return; }

  // 1) Layer hit test (top-most first). Rotated layers: inverse-transform
  //    the pointer into the layer's local (unrotated) frame before testing.
  for (let i = state.layers.length - 1; i >= 0; i--) {
    const l = state.layers[i];
    if (!l._bbox) continue;
    const b = l._bbox;
    let px = pt.x, py = pt.y;
    if (l.rotation) {
      const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
      const dx = pt.x - cx, dy = pt.y - cy;
      const r = -l.rotation * Math.PI / 180;
      px = dx * Math.cos(r) - dy * Math.sin(r) + cx;
      py = dx * Math.sin(r) + dy * Math.cos(r) + cy;
    }
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
      if (e.shiftKey) {
        // Shift-click: toggle membership; don't start a drag.
        toggleLayerSelection(l.id);
        e.preventDefault();
        return;
      }
      // Alt-drag = duplicate-in-place + drag the copy (Figma/Sketch).
      // If the clicked layer wasn't selected, treat it as the one source.
      if (e.altKey) {
        if (!isLayerSelected(l.id)) {
          state.selectedLayerIds = [l.id];
          state.activeLayerId = l.id;
          state.videoSelected = false;
        }
        duplicateSelectedLayersInPlace();   // selection now = the new copies
        refreshLayerList();
        syncEditPanel();
      } else {
        // Plain click on an unselected layer = exclusive select. On an
        // already-selected layer = keep the current multi-selection.
        if (!isLayerSelected(l.id)) selectLayer(l.id);
        pushUndo();   // each layer drag = one undo entry
      }
      const movedIds = state.selectedLayerIds.slice();
      const starts = movedIds.map(id => {
        const ly = state.layers.find(x => x.id === id);
        return ly ? { id, x: ly.x, y: ly.y } : null;
      }).filter(Boolean);
      canvasDrag = {
        kind: 'layer-move',
        starts,
        startCanvasX: pt.x, startCanvasY: pt.y,
        primaryId: state.activeLayerId,
        pointerId: e.pointerId,
      };
      try { canvas.setPointerCapture(e.pointerId); } catch {}
      updateTextToolbar(); // hides because canvasDrag is set
      e.preventDefault();
      return;
    }
  }

  // 2) Video hit test.
  const t = state.video.transform;
  if (t && pt.x >= t.x && pt.x <= t.x + t.w && pt.y >= t.y && pt.y <= t.y + t.h) {
    selectVideo();
    pushUndo();
    canvasDrag = {
      kind: 'video-move',
      startCanvasX: pt.x, startCanvasY: pt.y,
      snapshot: { x: t.x, y: t.y, w: t.w, h: t.h },
      pointerId: e.pointerId,
    };
    try { canvas.setPointerCapture(e.pointerId); } catch {}
    e.preventDefault();
    return;
  }

  // 3) Empty click — deselect.
  deselectAll();
  draw();
});

// Resize handles (DOM) — pointer events resolved against the original client position
// so we work in canvas-coords regardless of the live transform.
handles.forEach(h => {
  h.addEventListener('pointerdown', e => {
    if (!state.video.transform) return;
    e.preventDefault();
    e.stopPropagation();
    selectVideo();
    pushUndo();
    const t = state.video.transform;
    canvasDrag = {
      kind: 'video-resize',
      corner: h.dataset.corner,
      startClientX: e.clientX, startClientY: e.clientY,
      snapshot: { x: t.x, y: t.y, w: t.w, h: t.h },
      pointerId: e.pointerId,
      target: h,
    };
    try { h.setPointerCapture(e.pointerId); } catch {}
  });
});

window.addEventListener('pointermove', e => {
  if (!canvasDrag) return;

  if (canvasDrag.kind === 'multi-rotate') {
    const ang = Math.atan2(e.clientY - canvasDrag.cyScreen, e.clientX - canvasDrag.cxScreen);
    let deltaDeg = (ang - canvasDrag.startAngle) * 180 / Math.PI;
    if (e.shiftKey) deltaDeg = Math.round(deltaDeg / 15) * 15;
    const dRad = deltaDeg * Math.PI / 180;
    const cos = Math.cos(dRad), sin = Math.sin(dRad);
    for (const snap of canvasDrag.snapshots) {
      const l = state.layers.find(x => x.id === snap.id);
      if (!l) continue;
      const sbCx = snap.bbox.x + snap.bbox.w / 2;
      const sbCy = snap.bbox.y + snap.bbox.h / 2;
      const dx = sbCx - canvasDrag.groupCx;
      const dy = sbCy - canvasDrag.groupCy;
      // Each layer's bbox CENTRE orbits the group centre by deltaDeg.
      const newCx = canvasDrag.groupCx + dx * cos - dy * sin;
      const newCy = canvasDrag.groupCy + dx * sin + dy * cos;
      const newBboxX = newCx - snap.bbox.w / 2;
      const newBboxY = newCy - snap.bbox.h / 2;
      // layer.x / layer.y is the anchor — for rect/image it equals bbox.x/y;
      // for text it's offset by alignment. Preserve that offset from the snap.
      const anchorOffsetX = snap.x - snap.bbox.x;
      const anchorOffsetY = snap.y - snap.bbox.y;
      l.x = newBboxX + anchorOffsetX;
      l.y = newBboxY + anchorOffsetY;
      // Each layer also spins by the same angle (its own rotation += delta).
      l.rotation = snap.rotation + deltaDeg;
    }
    draw();
    return;
  }

  if (canvasDrag.kind === 'multi-resize') {
    const u = canvasDrag.union;
    if (u.w < 1 || u.h < 1) return;     // can't scale a zero-area selection
    const corner = canvasDrag.corner;
    const alt = e.altKey;
    const k = alt ? 2 : 1;              // Alt = scale from centre (double rate)
    const dx = (e.clientX - canvasDrag.startClientX) / viewScale;
    const dy = (e.clientY - canvasDrag.startClientY) / viewScale;
    // Anchor: opposite corner (default) or union centre (Alt).
    const anchorX = alt ? u.x + u.w / 2 : (corner.includes('w') ? u.x + u.w : u.x);
    const anchorY = alt ? u.y + u.h / 2 : (corner.includes('n') ? u.y + u.h : u.y);
    // How much the dragged corner moves in each axis, signed so growing the
    // bbox is positive regardless of which corner is being dragged. With Alt,
    // both sides of the centre expand so we apply 2× the drag amount.
    const dragW = (corner.includes('w') ? -dx : dx) * k;
    const dragH = (corner.includes('n') ? -dy : dy) * k;
    // Uniform scale: pick the axis whose drag ratio is bigger so the cursor
    // stays at-or-past the dragged corner of the new bbox.
    const sX = (u.w + dragW) / u.w;
    const sY = (u.h + dragH) / u.h;
    let s = Math.abs(sX) >= Math.abs(sY) ? sX : sY;
    // Clamp positive — disallow flipping for now (cleaner UX for groups).
    s = Math.max(0.05, s);
    for (const snap of canvasDrag.snapshots) {
      const l = state.layers.find(x => x.id === snap.id);
      if (!l) continue;
      // Scale POSITION relative to the anchor (preserves group spacing).
      l.x = anchorX + (snap.x - anchorX) * s;
      l.y = anchorY + (snap.y - anchorY) * s;
      // Scale SIZE per kind. Text uses fontSize (+ box dims if it has a box).
      if (snap.kind === 'rect' || snap.kind === 'image') {
        l.w = Math.max(2, snap.w * s);
        l.h = Math.max(2, snap.h * s);
      } else {
        if (snap.fontSize  != null) l.fontSize  = Math.max(1, Math.round(snap.fontSize * s));
        if (snap.maxWidth  != null) l.maxWidth  = Math.max(8, snap.maxWidth  * s);
        if (snap.boxHeight != null) l.boxHeight = Math.max(8, snap.boxHeight * s);
      }
    }
    draw();
    return;
  }

  if (canvasDrag.kind === 'layer-rotate') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const ang = Math.atan2(e.clientY - canvasDrag.cyScreen, e.clientX - canvasDrag.cxScreen);
    const dDeg = (ang - canvasDrag.startAngle) * 180 / Math.PI;
    let rot = (canvasDrag.startRotation + dDeg) % 360;
    if (rot > 180)  rot -= 360;
    if (rot <= -180) rot += 360;
    if (e.shiftKey) rot = Math.round(rot / 15) * 15;   // Shift snaps to 15°
    layer.rotation = rot;
    draw();
    return;
  }

  if (canvasDrag.kind === 'tool-draw-rect') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const pt = screenToCanvas(e.clientX, e.clientY);
    const dx = pt.x - canvasDrag.originX;
    const dy = pt.y - canvasDrag.originY;
    if (Math.abs(dx) > DRAW_MOVE_THRESHOLD || Math.abs(dy) > DRAW_MOVE_THRESHOLD) canvasDrag.moved = true;
    if (canvasDrag.moved) {
      layer.x = Math.min(canvasDrag.originX, pt.x);
      layer.y = Math.min(canvasDrag.originY, pt.y);
      layer.w = Math.max(2, Math.abs(dx));
      layer.h = Math.max(2, Math.abs(dy));
      draw();
      snapToolDraw(layer, canvasDrag.originX, canvasDrag.originY, pt.x, pt.y);
      draw();
    }
    return;
  }

  if (canvasDrag.kind === 'tool-draw-text') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const pt = screenToCanvas(e.clientX, e.clientY);
    const dx = pt.x - canvasDrag.originX;
    const dy = pt.y - canvasDrag.originY;
    if (Math.abs(dx) > DRAW_MOVE_THRESHOLD || Math.abs(dy) > DRAW_MOVE_THRESHOLD) canvasDrag.moved = true;
    if (canvasDrag.moved) {
      // Drag = constrained text BOX. Anchor stays at the top-left of the
      // dragged rectangle; both width AND height follow the drag, so the
      // bbox is whatever shape the user draws — not just the text fit.
      layer.x = Math.min(canvasDrag.originX, pt.x);
      layer.y = Math.min(canvasDrag.originY, pt.y);
      layer.maxWidth  = Math.max(20, Math.abs(dx));
      layer.boxHeight = Math.max(20, Math.abs(dy));
      draw();
      snapToolDraw(layer, canvasDrag.originX, canvasDrag.originY, pt.x, pt.y);
      draw();
    }
    return;
  }

  if (canvasDrag.kind === 'layer-move') {
    const pt = screenToCanvas(e.clientX, e.clientY);
    let dx = pt.x - canvasDrag.startCanvasX;
    let dy = pt.y - canvasDrag.startCanvasY;
    if (e.shiftKey) { if (Math.abs(dx) > Math.abs(dy)) dy = 0; else dx = 0; }
    // Apply the same dx/dy to every selected layer. No clamping — layers can
    // be positioned anywhere (off-canvas in any direction), like Figma.
    for (const s of canvasDrag.starts) {
      const ly = state.layers.find(l => l.id === s.id);
      if (!ly) continue;
      ly.x = s.x + dx;
      ly.y = s.y + dy;
    }
    draw();
    // Snap as a GROUP: the union bbox of every selected layer gets snapped
    // to canvas + non-selected element guides; the resulting shift is
    // applied uniformly so the whole group locks to the guide together.
    // Single-selection still uses the per-layer snap.
    if (state.selectedLayerIds.length > 1) {
      const { dx: sdx, dy: sdy } = snapMoveSelectionDelta();
      if (sdx !== 0 || sdy !== 0) {
        for (const s of canvasDrag.starts) {
          const ly = state.layers.find(l => l.id === s.id);
          if (ly) { ly.x += sdx; ly.y += sdy; }
        }
        draw();
      }
    } else {
      const primary = state.layers.find(l => l.id === canvasDrag.primaryId);
      if (primary) {
        applySnapMoveLayer(primary);
        draw();
      }
    }

  } else if (canvasDrag.kind === 'video-move') {
    const t = state.video.transform;
    const s = canvasDrag.snapshot;
    const pt = screenToCanvas(e.clientX, e.clientY);
    let dx = pt.x - canvasDrag.startCanvasX;
    let dy = pt.y - canvasDrag.startCanvasY;
    if (e.shiftKey) { if (Math.abs(dx) > Math.abs(dy)) dy = 0; else dx = 0; }
    t.x = s.x + dx;
    t.y = s.y + dy;
    applySnapMove();
    updateVideoChrome();
    draw();

  } else if (canvasDrag.kind === 'video-resize') {
    const t = state.video.transform;
    const s = canvasDrag.snapshot;
    const dx = (e.clientX - canvasDrag.startClientX) / viewScale;
    const dy = (e.clientY - canvasDrag.startClientY) / viewScale;
    const ratio = s.w / s.h;
    const corner = canvasDrag.corner;
    const alt = e.altKey;
    const k = alt ? 2 : 1;
    const MIN = MIN_VIDEO_SIZE;
    let newW, newH, newX, newY;

    if (corner.length === 2) {
      const dwUser = (corner.includes('w') ? -dx : dx) * k;
      const dhUser = (corner.includes('n') ? -dy : dy) * k;
      const dw = (Math.abs(dwUser) > Math.abs(dhUser) * ratio) ? dwUser : dhUser * ratio;
      newW = Math.max(MIN, s.w + dw);
      newH = newW / ratio;
      if (alt) {
        const cx = s.x + s.w / 2, cy = s.y + s.h / 2;
        newX = cx - newW / 2; newY = cy - newH / 2;
      } else {
        newX = corner.includes('w') ? (s.x + s.w) - newW : s.x;
        newY = corner.includes('n') ? (s.y + s.h) - newH : s.y;
      }
    } else if (corner === 'n' || corner === 's') {
      const dh = (corner === 'n' ? -dy : dy) * k;
      newH = Math.max(MIN / ratio, s.h + dh);
      newW = newH * ratio;
      const cx = s.x + s.w / 2;
      newX = cx - newW / 2;
      newY = alt ? (s.y + s.h / 2) - newH / 2 : (corner === 'n' ? (s.y + s.h) - newH : s.y);
    } else {
      const dw = (corner === 'w' ? -dx : dx) * k;
      newW = Math.max(MIN, s.w + dw);
      newH = newW / ratio;
      const cy = s.y + s.h / 2;
      newY = cy - newH / 2;
      newX = alt ? (s.x + s.w / 2) - newW / 2 : (corner === 'w' ? (s.x + s.w) - newW : s.x);
    }
    t.x = newX; t.y = newY; t.w = newW; t.h = newH;
    applySnapResize(corner, alt);
    updateVideoChrome();
    draw();

  } else if (canvasDrag.kind === 'layer-resize') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const s = canvasDrag.snapshot;
    const startBbox = canvasDrag.startBbox;
    const corner = canvasDrag.corner;

    const alt = e.altKey;
    const k = alt ? 2 : 1;     // alt scales twice as fast → center stays fixed

    // Inverse-rotate the screen-space drag delta into the layer's LOCAL
    // (unrotated) frame so the existing axis-aligned resize logic still
    // works for rotated layers. The world-space anchor of the opposite
    // corner is then re-applied at the end (see below).
    const rotDeg = layer.rotation || 0;
    const dxRaw = (e.clientX - canvasDrag.startClientX) / viewScale;
    const dyRaw = (e.clientY - canvasDrag.startClientY) / viewScale;
    let dx, dy;
    if (rotDeg) {
      const r = -rotDeg * Math.PI / 180;
      dx = dxRaw * Math.cos(r) - dyRaw * Math.sin(r);
      dy = dxRaw * Math.sin(r) + dyRaw * Math.cos(r);
    } else { dx = dxRaw; dy = dyRaw; }

    // Text WITHOUT a box → corner-only font-scale resize (existing behavior).
    // Everything else (text-with-box, rect, image) → free 8-handle BOX resize.
    const useFontScale = layer.kind === 'text' && layer.maxWidth == null;
    const hasDirectWH = layer.kind === 'rect' || layer.kind === 'image';

    if (useFontScale) {
      const ratio = startBbox.w / startBbox.h;
      const dwUser = (corner.includes('w') ? -dx : dx) * k;
      const dhUser = (corner.includes('n') ? -dy : dy) * k;
      const dw = (Math.abs(dwUser) > Math.abs(dhUser) * ratio) ? dwUser : dhUser * ratio;
      const newW = Math.max(8, startBbox.w + dw);
      const scale = newW / startBbox.w;
      layer.fontSize = Math.max(1, Math.round(s.fontSize * scale));
      layer.x = s.x;
      layer.y = s.y;
      draw();                  // re-measures with new font
      const nb = layer._bbox;
      if (alt) {
        const cx_start = startBbox.x + startBbox.w / 2;
        const cy_start = startBbox.y + startBbox.h / 2;
        const cx_new   = nb.x + nb.w / 2;
        const cy_new   = nb.y + nb.h / 2;
        layer.x += (cx_start - cx_new);
        layer.y += (cy_start - cy_new);
      } else {
        const fixedX_s = corner.includes('w') ? startBbox.x + startBbox.w : startBbox.x;
        const fixedY_s = corner.includes('n') ? startBbox.y + startBbox.h : startBbox.y;
        const fixedX_n = corner.includes('w') ? nb.x + nb.w               : nb.x;
        const fixedY_n = corner.includes('n') ? nb.y + nb.h               : nb.y;
        layer.x += (fixedX_s - fixedX_n);
        layer.y += (fixedY_s - fixedY_n);
      }
    } else {
      // Box resize — operates on (x, y, w, h) for rect or (x, y, maxWidth,
      // boxHeight) for text. Font size is preserved; text re-wraps inside
      // the new box.
      const MIN = 8;
      const lockRatio = e.shiftKey;
      const sw = hasDirectWH ? s.w : (s.maxWidth  || 0);
      const sh = hasDirectWH ? s.h : (s.boxHeight || 0);
      const ratio = sw / sh;
      const cx = s.x + sw / 2, cy = s.y + sh / 2;
      let newX = s.x, newY = s.y, newW = sw, newH = sh;
      if (corner.includes('e')) newW = Math.max(MIN, sw + dx * k);
      if (corner.includes('w')) newW = Math.max(MIN, sw - dx * k);
      if (corner.includes('s')) newH = Math.max(MIN, sh + dy * k);
      if (corner.includes('n')) newH = Math.max(MIN, sh - dy * k);
      if (lockRatio && corner.length === 2) {
        if (Math.abs(newW - sw) * (1 / ratio) > Math.abs(newH - sh)) newH = newW / ratio;
        else                                                          newW = newH * ratio;
      }
      if (alt) {
        if (newW !== sw) newX = cx - newW / 2;
        if (newH !== sh) newY = cy - newH / 2;
      } else {
        if (corner.includes('w')) newX = s.x + (sw - newW);
        if (corner.includes('n')) newY = s.y + (sh - newH);
      }
      layer.x = newX; layer.y = newY;
      if (hasDirectWH) { layer.w = newW; layer.h = newH; }
      else             { layer.maxWidth = newW; layer.boxHeight = newH; }
      // Snap. Skip while user holds a constraint, or for rotated layers
      // (snap targets aren't meaningful against a rotated bbox edge).
      if (!e.shiftKey && !alt && !rotDeg) applySnapResizeRect(layer, corner);
    }
    draw();
    // Rotated layers: the existing resize logic anchored the opposite corner
    // in the LOCAL (unrotated) frame. With rotation around the BBOX CENTRE,
    // that corner moves in WORLD space because the centre shifted. Compensate
    // by translating the layer so the opposite corner's WORLD position stays
    // exactly where it was at drag-start (matches how Figma anchors resizes).
    if (rotDeg && !alt) {
      applyRotatedWorldAnchor(layer, startBbox, corner, rotDeg);
      draw();
    }
  }
});

window.addEventListener('pointerup', e => {
  if (!canvasDrag) return;
  // Tool-draws: resolve single-click vs drag, then revert tool to 'select'.
  if (canvasDrag.kind === 'tool-draw-rect') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (layer && !canvasDrag.moved) {
      // Single click — 150×150 centred at the cursor.
      layer.x = canvasDrag.originX - RECT_DEFAULT / 2;
      layer.y = canvasDrag.originY - RECT_DEFAULT / 2;
      layer.w = RECT_DEFAULT;
      layer.h = RECT_DEFAULT;
    }
    try { canvas.releasePointerCapture(canvasDrag.pointerId); } catch {}
    canvasDrag = null;
    setTool('select');
    selectLayer(layer ? layer.id : null);
    draw();
    return;
  }
  if (canvasDrag.kind === 'tool-draw-text') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    try { canvas.releasePointerCapture(canvasDrag.pointerId); } catch {}
    canvasDrag = null;
    setTool('select');
    if (layer) {
      selectLayer(layer.id);
      // Auto-enter inline edit so the user can immediately type.
      startInlineEdit(layer);
    }
    draw();
    return;
  }
  try {
    if (canvasDrag.target) canvasDrag.target.releasePointerCapture(canvasDrag.pointerId);
    else canvas.releasePointerCapture(canvasDrag.pointerId);
  } catch {}
  canvasDrag = null;
  hideGuides();
  updateTextToolbar();
});
window.addEventListener('pointercancel', () => { canvasDrag = null; hideGuides(); updateTextToolbar(); });

// Click anywhere outside the canvas / chrome to deselect the video — matches
// how kadreerija drops selection when you click off the photo. The canvas
// handler already deselects on empty-canvas clicks, so this only needs to
// cover clicks that land elsewhere (sidebar, transport, padding).
// `click` (not `pointerdown`) so drags inside the sidebar don't trigger it
// and so buttons like Fit-cover can re-select the video in their own handler.
// Outside-click deselect. Clicks land inside a whitelist of "keep selection"
// zones (canvas + chromes + sidebar layer list + style panel + toolbars +
// font menus + inline editor + fit-cover) — anything else drops the
// selection. This matches a typical editor where clicking the page chrome
// outside the canvas exits the current selection cleanly.
document.addEventListener('click', e => {
  if (!state.videoSelected && !state.selectedLayerIds.length) return;
  if (e.target === canvas) return;
  const t = e.target;
  if (t.closest('.video-chrome'))                return;
  if (t.closest('.layer-chrome'))                return;
  if (t.closest('.text-toolbar'))                return;
  if (t.closest('.font-menu'))                   return;
  if (t.closest('.font-weights-menu'))           return;
  if (t.closest('.inline-editor'))               return;
  if (t.closest('.layer-row'))                   return; // sidebar list selection
  if (t.closest('.edit-panel'))                  return; // style controls for active layer
  if (t.closest('#fit-cover-btn'))               return; // re-selects video itself
  if (t.closest('.canvas-tools'))                return; // setTool handles deselect itself
  deselectAll();
  draw();
});

// ═════════════════════════════════════ Double-click to edit text inline ═════════════════════════════════════
canvas.addEventListener('dblclick', e => {
  const pt = screenToCanvas(e.clientX, e.clientY);
  for (let i = state.layers.length - 1; i >= 0; i--) {
    const l = state.layers[i];
    if (!l._bbox) continue;
    const b = l._bbox;
    let px = pt.x, py = pt.y;
    if (l.rotation) {
      const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
      const dx = pt.x - cx, dy = pt.y - cy;
      const r = -l.rotation * Math.PI / 180;
      px = dx * Math.cos(r) - dy * Math.sin(r) + cx;
      py = dx * Math.sin(r) + dy * Math.cos(r) + cy;
    }
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
      if (l.kind !== 'text') return;        // only text layers have content to edit
      startInlineEdit(l);
      return;
    }
  }
});

function startInlineEdit(layer) {
  pushUndo();
  selectLayer(layer.id);
  // Make sure the bbox is current.
  draw();
  const b = layer._bbox;
  if (!b) return;
  inlineEditingLayerId = layer.id;
  inlineEditor.value = layer.content;
  positionInlineEditor(layer);
  inlineEditor.classList.remove('hidden');
  // Re-draw so the canvas-rendered version of this layer is hidden under the editor.
  draw();
  inlineEditor.focus();
  inlineEditor.select();
  // Keep the contextual toolbar visible above the inline editor.
  updateTextToolbar();
}

function positionInlineEditor(layer) {
  const b = layer._bbox;
  if (!b) return;
  const fontFamily = layer.fontFamily.includes(' ') && !/['",]/.test(layer.fontFamily)
    ? `"${layer.fontFamily}", system-ui, sans-serif`
    : `${layer.fontFamily}, system-ui, sans-serif`;
  // Match the canvas-drawn text exactly — same font, size, weight, alignment.
  // All dimensions are in screen-px (canvas-coords × viewScale).
  inlineEditor.style.left       = (b.x * viewScale) + 'px';
  inlineEditor.style.top        = (b.y * viewScale) + 'px';
  inlineEditor.style.width      = Math.max(20, b.w * viewScale) + 'px';
  inlineEditor.style.height     = Math.max(20, b.h * viewScale) + 'px';
  inlineEditor.style.fontFamily = fontFamily;
  inlineEditor.style.fontSize   = (layer.fontSize * viewScale) + 'px';
  inlineEditor.style.fontWeight = String(layer.fontWeight);
  inlineEditor.style.color      = layer.color;
  inlineEditor.style.opacity    = String(layer.opacity);
  inlineEditor.style.textAlign  = layer.align;
  inlineEditor.style.lineHeight = String(layer.lineHeight ?? 0.8);
}

inlineEditor.addEventListener('input', () => {
  if (!inlineEditingLayerId) return;
  const l = state.layers.find(x => x.id === inlineEditingLayerId);
  if (!l) return;
  l.content = inlineEditor.value;
  // Re-measure so the editor box can grow/shrink with the text.
  // We have to temporarily un-hide the layer in draw so a fresh _bbox is computed.
  const savedId = inlineEditingLayerId;
  inlineEditingLayerId = null;
  draw();                  // updates _bbox using new content
  inlineEditingLayerId = savedId;
  positionInlineEditor(l);
  refreshLayerList();
  draw();                  // re-render with editor visible
});

inlineEditor.addEventListener('blur', endInlineEdit);
inlineEditor.addEventListener('keydown', e => {
  // Escape commits and exits. Cmd/Ctrl+Enter also exits. Plain Enter inserts a newline.
  if (e.key === 'Escape') { e.preventDefault(); endInlineEdit(); }
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); endInlineEdit(); }
});

function endInlineEdit() {
  if (!inlineEditingLayerId) return;
  inlineEditingLayerId = null;
  inlineEditor.classList.add('hidden');
  refreshLayerList();
  draw();
  updateTextToolbar();
}

// ═════════════════════════════════════ Video upload ═════════════════════════════════════
let currentObjectUrl = null;
const VIDEO_EXT_RE = /\.(mp4|m4v|mov|qt|webm|mkv|ogv|ogg)$/i;
const IMAGE_EXT_RE = /\.(png|jpe?g|gif|webp|svg|bmp)$/i;
function looksLikeVideo(file) {
  if (!file) return false;
  if (file.type && file.type.startsWith('video/')) return true;
  if (file.name && VIDEO_EXT_RE.test(file.name)) return true;
  return false;
}
function looksLikeImage(file) {
  if (!file) return false;
  if (file.type && file.type.startsWith('image/')) return true;
  if (file.name && IMAGE_EXT_RE.test(file.name)) return true;
  return false;
}

// Drop an image file onto the canvas (or anywhere) — creates an image
// layer centred at the drop point, sized to fit within ~40% of the canvas
// while preserving the source aspect ratio.
function addImageLayerFromFile(file, dropCanvasX, dropCanvasY) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    imageCache.set(url, img);
    const sz = activeSize();
    const maxW = sz.w * 0.4;
    const maxH = sz.h * 0.4;
    const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
    const w = img.naturalWidth  * scale;
    const h = img.naturalHeight * scale;
    const cx = (dropCanvasX == null) ? sz.w / 2 : dropCanvasX;
    const cy = (dropCanvasY == null) ? sz.h / 2 : dropCanvasY;
    pushUndo();
    const layer = {
      id: uid(),
      kind: 'image',
      src: url,
      naturalW: img.naturalWidth,
      naturalH: img.naturalHeight,
      x: cx - w / 2, y: cy - h / 2, w, h,
      opacity: 1,
      rotation: 0,
    };
    state.layers.push(layer);
    if (!state.masterFormat) state.masterFormat = state.sizeId;
    propagateNewLayerFromMaster(layer);
    selectLayer(layer.id);
    draw();
  };
  img.onerror = () => {
    URL.revokeObjectURL(url);
    alert("Couldn't load that image.");
  };
  img.src = url;
}
function loadVideoFromFile(file) {
  if (!looksLikeVideo(file)) {
    alert('That doesn\'t look like a video. Supported: .mp4, .mov, .webm');
    return;
  }
  if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
  currentObjectUrl = URL.createObjectURL(file);
  state.video.file = file;
  state.video.url = currentObjectUrl;
  videoEl.onerror = () => {
    console.error('Video element error:', videoEl.error);
    alert('This browser couldn\'t decode the video. Try MP4 (H.264) or WebM, or open in Chrome.');
  };
  videoEl.src = currentObjectUrl;
  videoEl.load();
}

videoEl.addEventListener('loadedmetadata', () => {
  state.video.duration  = videoEl.duration || 0;
  state.video.naturalW  = videoEl.videoWidth;
  state.video.naturalH  = videoEl.videoHeight;
  state.video.loaded    = true;
  state.video.currentTime = 0;
  // Manual loop management (so trim is respected). The native videoEl.loop
  // would loop to 0; we want to loop to trimStart.
  videoEl.loop = false;
  state.trimStart = 0;
  state.trimEnd   = state.video.duration;
  // New video → reset every format's per-slot layout. (Layers won't carry
  // across videos since they were positioned for an older clip.)
  state.formats = {};
  state.masterFormat = null;
  // Drop any cached image-layer bitmaps; their layers are gone with the slots.
  imageCache.clear();
  state.layers = [];
  state.video.transform = null;
  state.activeLayerId = null;
  state.selectedLayerIds = [];
  state.videoSelected = false;
  setUiEnabled(true);
  totalTimeEl.textContent = fmtTime(state.video.duration);
  curTimeEl.textContent   = fmtTime(0);
  fitVideoCover();
  // Seed the slot from the working state.
  state.formats[state.sizeId] = { layers: state.layers, videoTransform: state.video.transform };
  refreshLayerList();
  selectVideo();
  syncEditPanel();
  draw();
  // HEVC / iPhone .mov workaround: paused frame 0 often won't render in
  // Chrome until the decoder is primed. Briefly play-and-pause silently.
  primeFirstFrame();
});

// HEVC / iPhone .mov: Chrome can decode for playback but sometimes can't
// read a paused frame back into a 2D canvas. Briefly play-and-pause to
// prime the decoder; the video element is muted so this is silent.
async function primeFirstFrame() {
  try {
    videoEl.muted = true;
    const p = videoEl.play();
    if (p) await p;
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    videoEl.pause();
    videoEl.currentTime = 0;
  } catch {}
}

videoEl.addEventListener('timeupdate', () => {
  if (state.exporting) return; // exporter manages currentTime updates from rAF anyway
  state.video.currentTime = videoEl.currentTime;
  reflectTime();
});
videoEl.addEventListener('seeked',  () => {
  state.video.currentTime = videoEl.currentTime;
  reflectTime();
  draw();
});
videoEl.addEventListener('play',    () => { state.video.playing = true;  reflectPlayIcon(); });
videoEl.addEventListener('pause',   () => { state.video.playing = false; reflectPlayIcon(); });
videoEl.addEventListener('ended',   () => {
  state.video.playing = false;
  reflectPlayIcon();
  // Always loop unless we're exporting (the exporter's 'ended' listener
  // owns end-of-stream). The rAF loop normally catches end-of-trim before
  // the native ended event, but if it ever fires (natural end, or a tiny
  // gap between rAF ticks) we restart from trimStart.
  if (state.loop && state.video.loaded && !state.exporting) {
    videoEl.currentTime = state.trimStart || 0;
    videoEl.play().catch(() => {});
  }
});

function reflectTime() {
  curTimeEl.textContent = fmtTime(state.video.currentTime);
  if (state.video.duration > 0) {
    const pct = (state.video.currentTime / state.video.duration) * 100;
    tlProgress.style.width = pct + '%';
    tlPlayhead.style.left  = pct + '%';
    updateTrimOverlay();
  }
}

// Sync the trim overlays to state.trimStart / state.trimEnd.
function updateTrimOverlay() {
  const d = state.video.duration;
  if (!d) { tlTrimLeft.style.width = '0%'; tlTrimRight.style.width = '0%'; return; }
  const leftPct  = Math.max(0, Math.min(100, (state.trimStart  / d) * 100));
  const rightPct = Math.max(0, Math.min(100, ((d - state.trimEnd) / d) * 100));
  tlTrimLeft.style.width  = leftPct  + '%';
  tlTrimRight.style.width = rightPct + '%';
}
function reflectPlayIcon() {
  // Pause icon when playing, play icon when paused.
  if (state.video.playing) {
    playIco.innerHTML = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
  } else {
    playIco.innerHTML = '<path d="M7 5v14l12-7z"/>';
  }
}

function setUiEnabled(loaded) {
  // Video-dependent controls only.
  playBtn.disabled     = !loaded;
  loopBtn.disabled     = !loaded;
  fitCoverBtn.disabled = !loaded;
  exportBtn.disabled   = !loaded;
  // Drawing tools work on an empty canvas too — no video required.
  toolTextBtn.disabled = false;
  toolRectBtn.disabled = false;
}

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  if (f) loadVideoFromFile(f);
  fileInput.value = '';
});

// Drag-and-drop video upload.
// Listen on the WHOLE window AND in capture phase so nothing else can swallow
// the events. preventDefault on both dragenter and dragover is required for
// drop to fire at all. No `types`-based filter — we accept all drags and let
// the drop handler inspect dataTransfer.files.
// Only treat a drag as a video-drop if it carries OS files. Layer-list
// reorder drags use 'text/plain' instead and shouldn't trigger the overlay.
function isFileDrag(e) {
  return e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files');
}
let dragDepth = 0;
window.addEventListener('dragenter', e => {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  if (state.exporting) return;
  dragDepth++;
  canvasArea.classList.add('drop-target');
}, true);
window.addEventListener('dragover', e => {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  if (state.exporting) return;
  if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
}, true);
window.addEventListener('dragleave', e => {
  if (!isFileDrag(e)) return;
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) canvasArea.classList.remove('drop-target');
}, true);
window.addEventListener('drop', e => {
  if (!isFileDrag(e)) return;   // layer reorder drops have no Files type — let them handle themselves
  e.preventDefault();
  dragDepth = 0;
  canvasArea.classList.remove('drop-target');
  if (state.exporting) return;
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (!f) return;
  if (looksLikeVideo(f)) {
    loadVideoFromFile(f);
  } else if (looksLikeImage(f)) {
    // Where in the canvas did the drop land? If outside, centre it.
    const r = canvas.getBoundingClientRect();
    const sz = activeSize();
    let cx = sz.w / 2, cy = sz.h / 2;
    if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
      cx = (e.clientX - r.left) * (sz.w / r.width);
      cy = (e.clientY - r.top)  * (sz.h / r.height);
    }
    addImageLayerFromFile(f, cx, cy);
  } else {
    alert('Drop a video (.mp4 .mov .webm) or an image (.png .jpg .svg).');
  }
}, true);

// ═════════════════════════════════════ Transport ═════════════════════════════════════
function togglePlay() {
  if (!state.video.loaded) return;
  if (videoEl.paused) {
    // Snap to trim range if currently outside it.
    if (videoEl.currentTime < state.trimStart || videoEl.currentTime >= state.trimEnd - 1e-3) {
      videoEl.currentTime = state.trimStart;
    }
    videoEl.play();
  } else {
    videoEl.pause();
  }
}
playBtn.addEventListener('click', togglePlay);

// Loop — default on. We manage loop manually (so it loops to trimStart, not 0),
// so videoEl.loop stays false; only the state.loop flag matters.
loopBtn.addEventListener('click', () => {
  state.loop = !state.loop;
  loopBtn.classList.toggle('active', state.loop);
});

// Fit video to cover the canvas frame (resets manual transform).
fitCoverBtn.addEventListener('click', () => {
  if (!state.video.loaded) return;
  pushUndo();
  fitVideoCover();
  selectVideo();
  draw();
});

// Spacebar = play/pause, but only when not focused in a typing surface
// (so users can press space inside the layer-text textarea normally).
function isTypingTarget(el) {
  if (!el) return false;
  const tag = el.tagName;
  // Used for arrow nudges & shortcut keys — keep INPUT/TEXTAREA/SELECT/BUTTON
  // as "typing" so their default key handling isn't hijacked.
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'BUTTON') return true;
  return el.isContentEditable;
}
// Stricter check for SPACE — only true text-content fields really need a
// space character. Everywhere else (buttons, number/range/color inputs,
// selects, the canvas) space should toggle play/pause.
function isSpaceTextTarget(el) {
  if (!el) return false;
  if (el.tagName === 'TEXTAREA') return true;
  if (el.tagName === 'INPUT') {
    const t = (el.type || 'text').toLowerCase();
    return t === 'text' || t === 'search' || t === 'password' || t === 'url' || t === 'email' || t === 'tel';
  }
  return el.isContentEditable;
}
window.addEventListener('keydown', e => {
  // Cmd/Ctrl+Z = undo, Cmd/Ctrl+Shift+Z (or Cmd+Y) = redo.
  if ((e.metaKey || e.ctrlKey) && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || e.key === 'Y')) {
    e.preventDefault();
    redo();
    return;
  }
  // Cmd/Ctrl+D — duplicate every selected layer. Browser default is
  // "bookmark page" which we replace. Available regardless of focus context.
  if ((e.metaKey || e.ctrlKey) && (e.key === 'd' || e.key === 'D')) {
    if (state.selectedLayerIds.length && !state.videoSelected) {
      e.preventDefault();
      duplicateSelectedLayers();
    }
    return;
  }
  // Delete / Backspace — remove every selected layer. Skipped while typing.
  if ((e.key === 'Delete' || e.key === 'Backspace') && !isTypingTarget(e.target)) {
    if (state.selectedLayerIds.length && !state.videoSelected) {
      e.preventDefault();
      deleteSelectedLayers();
    }
    return;
  }
  if (e.code === 'Space' && !isSpaceTextTarget(e.target)) {
    e.preventDefault();
    togglePlay();
  }
  // Tool shortcuts — V / T / R (Figma convention). Skip while typing or
  // when a modifier is held (so Cmd+V/etc. still works).
  if (!e.metaKey && !e.ctrlKey && !e.altKey && !isTypingTarget(e.target)) {
    const k = e.key.toLowerCase();
    if (k === 'v' || k === 't' || k === 'r') {
      // Text and Rect tools need a loaded video to create something on.
      const wanted = k === 'v' ? 'select' : k === 't' ? 'text' : 'rect';
      if (wanted === 'select' || state.video.loaded) {
        e.preventDefault();
        setTool(wanted);
      }
    }
  }
  // Arrow keys nudge the active element by 1px (Shift = 10px). Skipped when
  // a text field / inline editor has focus so normal text navigation works.
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    if (isTypingTarget(e.target)) return;
    const step = e.shiftKey ? 10 : 1;
    let dx = 0, dy = 0;
    if (e.key === 'ArrowLeft')  dx = -step;
    if (e.key === 'ArrowRight') dx =  step;
    if (e.key === 'ArrowUp')    dy = -step;
    if (e.key === 'ArrowDown')  dy =  step;
    if (nudgeActive(dx, dy)) e.preventDefault();
  }
});

// Returns true if the nudge applied so we can preventDefault page scroll.
function nudgeActive(dx, dy) {
  pushUndo('nudge');
  if (state.videoSelected && state.video.transform) {
    state.video.transform.x += dx;
    state.video.transform.y += dy;
    updateVideoChrome();
    draw();
    return true;
  }
  if (state.selectedLayerIds.length) {
    for (const id of state.selectedLayerIds) {
      const l = state.layers.find(x => x.id === id);
      if (l) { l.x += dx; l.y += dy; }
    }
    refreshLayerList();
    draw();
    return true;
  }
  return false;
}

// ═════════════════════════════════════ Timeline scrubbing + per-layer range ═════════════════════════════════════
function timelineXToTime(clientX) {
  const r = timeline.getBoundingClientRect();
  const pct = clamp((clientX - r.left) / r.width, 0, 1);
  return pct * (state.video.duration || 0);
}

timeline.addEventListener('pointerdown', e => {
  if (!state.video.loaded) return;
  // If the click landed on a trim handle, defer to its own handler.
  if (e.target === tlTrimLeft || e.target === tlTrimRight) return;
  timelineDrag = { pointerId: e.pointerId, kind: 'scrub' };
  videoEl.currentTime = timelineXToTime(e.clientX);
  try { timeline.setPointerCapture(e.pointerId); } catch {}
  e.preventDefault();
});
timeline.addEventListener('pointermove', e => {
  if (!timelineDrag || timelineDrag.kind !== 'scrub') return;
  videoEl.currentTime = timelineXToTime(e.clientX);
});
timeline.addEventListener('pointerup', e => {
  if (!timelineDrag) return;
  try { timeline.releasePointerCapture(timelineDrag.pointerId); } catch {}
  timelineDrag = null;
});

// Trim handles — dragging either overlay's inner edge moves the in/out
// point. We seek the video to the new trim position so the user previews
// the exact frame they're trimming to.
function bindTrimHandle(el, which) {
  let drag = null;
  el.addEventListener('pointerdown', e => {
    if (!state.video.loaded) return;
    e.preventDefault();
    e.stopPropagation();
    pushUndo();
    drag = {
      pointerId: e.pointerId,
      startClientX: e.clientX,
      startVal: which === 'start' ? state.trimStart : state.trimEnd,
    };
    el.classList.add('dragging');
    try { el.setPointerCapture(e.pointerId); } catch {}
  });
  el.addEventListener('pointermove', e => {
    if (!drag) return;
    const r = timeline.getBoundingClientRect();
    const dxSec = ((e.clientX - drag.startClientX) / r.width) * state.video.duration;
    let v = drag.startVal + dxSec;
    if (which === 'start') {
      v = clamp(v, 0, state.trimEnd - MIN_TRIM);
      state.trimStart = v;
      videoEl.currentTime = v;
    } else {
      v = clamp(v, state.trimStart + MIN_TRIM, state.video.duration);
      state.trimEnd = v;
      videoEl.currentTime = Math.max(state.trimStart, v - 0.001);
    }
    updateTrimOverlay();
  });
  const finish = () => {
    if (!drag) return;
    try { el.releasePointerCapture(drag.pointerId); } catch {}
    el.classList.remove('dragging');
    drag = null;
  };
  el.addEventListener('pointerup', finish);
  el.addEventListener('pointercancel', finish);
}
bindTrimHandle(tlTrimLeft,  'start');
bindTrimHandle(tlTrimRight, 'end');

// ═════════════════════════════════════ Render loop ═════════════════════════════════════
// The draw loop is always-on. It re-draws on every animation frame so:
//   (1) the canvas reflects video playback frame-by-frame,
//   (2) canvas.captureStream picks up smooth motion during export,
//   (3) scrubbing/dragging/editing visibly updates immediately.
function rafLoop() {
  if (!state.exporting && state.video.loaded) {
    state.video.currentTime = videoEl.currentTime;
    // Enforce trim-out: loop to trimStart if looping is on, else pause.
    // The exporter has its own end-of-trim logic so we skip this branch then.
    if (!videoEl.paused && state.trimEnd > state.trimStart &&
        videoEl.currentTime >= state.trimEnd - 1e-3) {
      if (state.loop) {
        videoEl.currentTime = state.trimStart;
      } else {
        videoEl.pause();
        videoEl.currentTime = state.trimEnd;
      }
    }
  }
  draw();
  if (state.video.loaded) reflectTime();
  requestAnimationFrame(rafLoop);
}

// ═════════════════════════════════════ Export ═════════════════════════════════════
// MediaRecorder approach (real-time):
//   • canvas.captureStream(fps) emits frames as we draw them
//   • videoEl.captureStream() gives us the AUDIO track (we drop its video)
//   • MediaRecorder mixes them, we collect chunks, and offer a download.
// Real-time means: a 30s clip records in ~30s. This is a documented limitation.
let exportRec = null;
let exportBlob = null;

async function startExport() {
  if (!state.video.loaded || state.exporting) return;

  // Pick the best supported MIME (mp4 in Safari, webm otherwise).
  const candidates = [
    'video/mp4;codecs=h264,aac',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm',
  ];
  const mimeType = candidates.find(m => window.MediaRecorder && MediaRecorder.isTypeSupported(m));
  if (!mimeType) {
    alert('This browser does not support MediaRecorder video recording.');
    return;
  }

  state.exporting = true;
  showExportOverlay('Exporting video…', 'Recording overlays in real time. Please don\'t switch tabs.');
  exportBtn.disabled = true;

  // Prepare canvas stream.
  const fps = 30;
  const canvasStream = canvas.captureStream(fps);

  // Try to capture audio from the video element. This MAY fail (Safari, CORS,
  // older Chromium versions) — we fall back to silent video.
  let audioTrack = null;
  try {
    const fn = videoEl.captureStream || videoEl.mozCaptureStream;
    if (fn) {
      const vs = fn.call(videoEl);
      const aTracks = vs.getAudioTracks();
      if (aTracks.length) audioTrack = aTracks[0];
    }
  } catch (e) {
    console.warn('Audio capture not available; exporting silent video.', e);
  }
  if (audioTrack) canvasStream.addTrack(audioTrack);

  // Unmute for export so audio is recorded. (Restore after.)
  // Disable loop too — otherwise the 'ended' event never fires and the
  // recorder runs forever (the progress bar appears to loop).
  const wasMuted = videoEl.muted;
  const wasLoop  = videoEl.loop;
  videoEl.muted = false;
  videoEl.loop  = false;

  const chunks = [];
  exportRec = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond: 8_000_000 });
  exportRec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };

  // Seek to trim-in, then play and record up to trim-out.
  const trimA = state.trimStart;
  const trimB = state.trimEnd;
  const trimDur = Math.max(0.05, trimB - trimA);
  await seekTo(trimA);

  const finishPromise = new Promise(resolve => {
    exportRec.onstop = () => resolve();
  });

  exportRec.start(250); // chunk every 250ms for smoother progress
  await videoEl.play().catch(() => {});

  // Stop at trim-out + drive progress bar off the trimmed range.
  const stopAndProgress = setInterval(() => {
    if (!state.exporting) return;
    const pct = Math.max(0, Math.min(100, ((videoEl.currentTime - trimA) / trimDur) * 100));
    exportBar.style.width = pct.toFixed(1) + '%';
    if (videoEl.currentTime >= trimB - 1e-3) {
      clearInterval(stopAndProgress);
      if (exportRec && exportRec.state !== 'inactive') exportRec.stop();
    }
  }, 50);

  // Fallback: if the source ends naturally before trim-out (e.g. trimEnd =
  // duration), still stop the recorder.
  const onEnded = () => {
    if (!exportRec) return;
    if (exportRec.state !== 'inactive') exportRec.stop();
  };
  videoEl.addEventListener('ended', onEnded, { once: true });

  await finishPromise;
  clearInterval(stopAndProgress);
  videoEl.removeEventListener('ended', onEnded);
  videoEl.muted = wasMuted;
  videoEl.loop  = wasLoop;
  videoEl.pause();

  if (!state.exporting) {
    // Cancelled mid-way.
    cleanupExport();
    return;
  }

  const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';
  exportBlob = new Blob(chunks, { type: mimeType });
  exportBlob._ext = ext;
  showExportComplete(ext);
}

function seekTo(t) {
  return new Promise(resolve => {
    if (Math.abs(videoEl.currentTime - t) < 0.001) return resolve();
    const onSeek = () => { videoEl.removeEventListener('seeked', onSeek); resolve(); };
    videoEl.addEventListener('seeked', onSeek);
    videoEl.currentTime = t;
  });
}

function showExportOverlay(title, msg) {
  exportTitle.textContent = title;
  exportMsg.textContent   = msg;
  exportBar.style.width   = '0%';
  exportDl.style.display  = 'none';
  exportCancel.textContent = 'Cancel';
  exportOverlay.classList.add('visible');
}

function showExportComplete(ext) {
  exportTitle.textContent = 'Export complete';
  exportMsg.textContent   = `Your video is ready as .${ext}. Click Download to save it.`;
  exportBar.style.width   = '100%';
  exportDl.style.display  = 'inline-flex';
  exportCancel.textContent = 'Close';
}

function cleanupExport() {
  state.exporting = false;
  exportBtn.disabled = !state.video.loaded;
  exportOverlay.classList.remove('visible');
  exportRec = null;
}

exportBtn.addEventListener('click', startExport);

exportCancel.addEventListener('click', () => {
  if (exportRec && exportRec.state === 'recording') {
    state.exporting = false;
    try { exportRec.stop(); } catch {}
  }
  cleanupExport();
  exportBlob = null;
});

exportDl.addEventListener('click', () => {
  if (!exportBlob) return;
  const url = URL.createObjectURL(exportBlob);
  const a = document.createElement('a');
  const stem = (state.video.file && state.video.file.name) ? state.video.file.name.replace(/\.[^.]+$/, '') : 'video';
  a.href = url;
  a.download = `${stem}-overlay.${exportBlob._ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
});

// ═════════════════════════════════════ Init ═════════════════════════════════════
function init() {
  buildSizeGrid();
  applySizeToCanvas();
  refreshLayerList();
  syncEditPanel();
  bindEditPanel();
  bindTextToolbar();
  // Tool buttons activate a draw-on-canvas mode. Clicking Select returns to
  // the default. Clicking the active draw tool again also returns.
  toolSelectBtn.addEventListener('click', () => setTool('select'));
  toolTextBtn.addEventListener('click',   () => setTool(state.tool === 'text' ? 'select' : 'text'));
  toolRectBtn.addEventListener('click',   () => setTool(state.tool === 'rect' ? 'select' : 'rect'));
  // Delete buttons (toolbar + sidebar) — remove all selected layers.
  ttDelete.addEventListener('click',    () => deleteSelectedLayers());
  epDeleteBtn.addEventListener('click', () => deleteSelectedLayers());
  // Escape returns to select tool while a tool is armed.
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.tool !== 'select' && !inlineEditingLayerId) {
      e.preventDefault();
      setTool('select');
    }
  });

  // Font picker — same component on both surfaces, sets fontFamily + fontWeight together.
  const fontPickerCtx = {
    getCurrent: () => {
      const l = activeLayer();
      return l && l.kind !== 'rect'
        ? { family: l.fontFamily, weight: l.fontWeight }
        : { family: 'MB Empire', weight: 700 };
    },
    onSelect: (family, weight) => {
      if (!state.selectedLayerIds.length) return;
      pushUndo();
      for (const id of state.selectedLayerIds) {
        const l = state.layers.find(x => x.id === id);
        if (!l || l.kind === 'rect') continue;
        l.fontFamily = family;
        l.fontWeight = weight;
      }
      refreshLayerList();
      syncEditPanel();
      updateTextToolbar();
      draw();
    },
  };
  mountFontPicker(fFontBtn,  fontPickerCtx);
  mountFontPicker(ttFontBtn, fontPickerCtx);
  setUiEnabled(false);
  requestAnimationFrame(rafLoop);
  preloadFonts();
}

// Canvas drawImage of text only uses fonts already loaded — @font-face is
// lazy by default. Explicitly trigger loads for every (family × weight)
// pair we expose so the first draw isn't a system-font fallback.
async function preloadFonts() {
  if (!document.fonts || !document.fonts.load) return;
  const families = ['MB Empire', 'Grifo S', 'Grifinito L', 'Grifinito M'];
  const weights = [300, 400, 500, 700];
  const tasks = [];
  for (const fam of families) {
    for (const w of weights) tasks.push(document.fonts.load(`${w} 64px "${fam}"`));
  }
  try { await Promise.allSettled(tasks); } catch {}
  draw();  // re-render now that the OTF files are decoded
}
init();
</script>
</body>
</html>
