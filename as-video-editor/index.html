        ? '<svg class="ico layer-kind" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 7c.702 3.296.702 6.704 0 10"/><path d="M4.5 7c-.702 3.296-.702 6.704 0 10"/><path d="M7 19.5c3.296.702 6.704.702 10 0"/><path d="M7 4.5c3.296-.702 6.704-.702 10 0"/><path d="M21 17h-3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1Z"/><path d="M21 2h-3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/><path d="M6 17H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1Z"/><path d="M6 2H3a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/></svg>'
        : '<svg class="ico layer-kind" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16"/><path d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2"/><path d="M9 20h6"/></svg>';
    row.innerHTML = `
      ${kindIcon}
      <div class="layer-text" title="${escapeAttr(preview)}">${escapeHtml(preview)}</div>
      <div class="layer-actions">
        <button class="layer-icon-btn" data-act="dup" title="Duplicate"><svg class="ico" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
        <button class="layer-icon-btn del" data-act="del" title="Delete"><svg class="ico" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      </div>
    `;
    row.addEventListener('click', e => {
      const actBtn = e.target.closest('[data-act]');
      if (actBtn) {
        if (actBtn.dataset.act === 'dup') duplicateLayer(layer.id);
        else if (actBtn.dataset.act === 'del') deleteLayer(layer.id);
        return;
      }
      if (e.shiftKey) toggleLayerSelection(layer.id);
      else setActiveLayer(layer.id);
    });
    // Drag-and-drop reorder (within the layer list).
    row.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', layer.id); } catch {}
      row.classList.add('dragging');
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      layerList.querySelectorAll('.drop-before, .drop-after').forEach(el => el.classList.remove('drop-before', 'drop-after'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const r = row.getBoundingClientRect();
      const before = (e.clientY - r.top) < r.height / 2;
      layerList.querySelectorAll('.drop-before, .drop-after').forEach(el => el.classList.remove('drop-before', 'drop-after'));
      row.classList.add(before ? 'drop-before' : 'drop-after');
    });
    row.addEventListener('dragleave', () => {
      row.classList.remove('drop-before', 'drop-after');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const r = row.getBoundingClientRect();
      const before = (e.clientY - r.top) < r.height / 2;
      const srcId = e.dataTransfer.getData('text/plain');
      row.classList.remove('drop-before', 'drop-after');
      if (srcId && srcId !== layer.id) reorderLayer(srcId, layer.id, before);
    });
    layerList.appendChild(row);
  }
  layerCountEl.textContent = state.layers.length ? `${state.layers.length} layer${state.layers.length === 1 ? '' : 's'}` : '';
  // The video is the bottom-most layer — show it as a (non-reorderable) row at
  // the end of the list so it's visible and selectable like any other layer.
  if (state.video.loaded) {
    const vrow = document.createElement('div');
    vrow.className = 'layer-row layer-video' + (state.videoSelected ? ' active' : '');
    vrow.tabIndex = 0;
    const vname = (state.video.file && state.video.file.name)
      ? state.video.file.name.replace(/\.[^.]+$/, '')
      : 'Video';
    vrow.innerHTML =
      '<svg class="ico layer-kind" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m10 8 6 4-6 4z"/></svg>'
      + `<div class="layer-text" title="${escapeAttr(vname)}">${escapeHtml(vname)}</div>`
      + '<span class="layer-badge">Video</span>';
    vrow.addEventListener('click', () => selectVideo());
    layerList.appendChild(vrow);
  }
  if (!state.layers.length && !state.video.loaded) {
    // Ghost skeleton rows so the empty Layers panel reads as "your layers go here".
    const widths = [72, 54, 84, 46];
    for (const w of widths) {
      const g = document.createElement('div');
      g.className = 'layer-row layer-ghost';
      g.style.setProperty('--ghost-w', w + '%');
      g.innerHTML = '<span class="ghost-ico"></span><span class="ghost-bar"></span>';
      layerList.appendChild(g);
    }
  }
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s); }

// ═════════════════════════════════════ Edit panel sync ═════════════════════════════════════
function syncEditPanel() {
  const l = activeLayer();
  editPanel.classList.toggle('disabled', !l);
  if (!l) return;
  const isRect  = l.kind === 'rect';
  const isImage = l.kind === 'image';
  const isText  = !isRect && !isImage;
  // Show/hide kind-specific fields. Image layers expose only opacity + delete.
  editPanel.querySelectorAll('.text-only').forEach(el => el.style.display = isText ? '' : 'none');
  editPanel.querySelectorAll('.rect-only').forEach(el => el.style.display = isRect ? '' : 'none');
  editPanel.querySelectorAll('.not-image').forEach(el => el.style.display = isImage ? 'none' : '');
  // Shared: opacity (also color, but image layers don't expose a colour).
  if (!isImage) {
    fColor.value    = l.color;
    fColorHex.value = fmtHex(l.color);
  }
  const opacityPct = Math.round(l.opacity * 100);
  fOpacity.value = opacityPct;
  if (document.activeElement !== fOpacityVal) fOpacityVal.value = String(opacityPct);
  if (isImage) return;          // images only have opacity + delete
  if (isRect) {
    fRadius.value = l.radius || 0;
    fRadiusVal.textContent = String(Math.round(l.radius || 0));
    return;
  }
  // Text-specific.
  setFontPickerBtn(fFontBtn, l.fontFamily, l.fontWeight);
  if (document.activeElement !== fSize) fSize.value = l.fontSize;
  const lhPct = Math.round((l.lineHeight ?? 0.8) * 100);
  fLineHeight.value = lhPct;
  if (document.activeElement !== fLineHeightVal) fLineHeightVal.value = String(lhPct);
  fAlign.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.v === l.align));
  fShadowOn.checked   = l.shadow.enabled;
  fShadowColor.value  = l.shadow.color;
  fShadowColorHex.value = fmtHex(l.shadow.color);
  fShadowBlur.value   = l.shadow.blur;    fShadowBlurVal.textContent = l.shadow.blur;
  const shOpacityPct = Math.round((l.shadow.opacity ?? 1) * 100);
  fShadowOpacity.value = shOpacityPct;
  if (document.activeElement !== fShadowOpacityVal) fShadowOpacityVal.value = String(shOpacityPct);
}

function bindEditPanel() {
  // Apply mutator to EVERY selected layer (the mutator is responsible for
  // any kind-guarding — e.g. radius is rect-only and ignored on text).
  const update = (mutator, undoKey) => {
    if (!state.selectedLayerIds.length) return;
    pushUndo(undoKey || 'sidebar-edit');
    for (const id of state.selectedLayerIds) {
      const l = state.layers.find(x => x.id === id);
      if (l) mutator(l);
    }
    refreshLayerList();
    draw();
    updateTextToolbar();
  };
  fSize.addEventListener('input',   () => {
    const v = parseInt(fSize.value, 10);
    if (!isFinite(v) || v < 1) return;
    update(l => { if (l.kind !== 'rect') l.fontSize = v; });
  });
  bindScrubArrows(fSizeArrows, {
    min: 1, max: 2000, pxPerUnit: 2,
    get: () => +fSize.value || activeLayer()?.fontSize || 64,
    set: (v) => { fSize.value = v; update(l => { if (l.kind !== 'rect') l.fontSize = v; }); },
  });
  fColor.addEventListener('input',   () => { fColorHex.value = fmtHex(fColor.value); update(l => l.color = fColor.value); });
  // HEX text: apply on every keystroke if valid, but only commit normalized value on blur/Enter.
  fColorHex.addEventListener('input', () => {
    const hex = parseHex(fColorHex.value);
    if (hex) { fColor.value = hex; update(l => l.color = hex); }
  });
  fColorHex.addEventListener('blur',  () => { fColorHex.value = fmtHex(fColor.value); });
  fColorHex.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); fColorHex.blur(); } });
  // Eyedropper — sample a colour from anywhere on screen (incl. the video frame).
  // Uses the Chromium EyeDropper API; the button is hidden where unsupported.
  if (fEyedropper) {
    if (!('EyeDropper' in window)) {
      fEyedropper.hidden = true;
    } else {
      fEyedropper.addEventListener('click', async () => {
        try {
          const { sRGBHex } = await new window.EyeDropper().open();
          const hex = parseHex(sRGBHex);
          if (hex) { fColor.value = hex; fColorHex.value = fmtHex(hex); update(l => l.color = hex); }
        } catch (_) { /* user cancelled (Escape) */ }
      });
    }
  }
  fOpacity.addEventListener('input', () => { fOpacityVal.value = fOpacity.value; update(l => l.opacity = +fOpacity.value / 100); });
  // Typing a number directly into the readout also commits it.
  fOpacityVal.addEventListener('input', () => {
    const v = clamp(parseInt(fOpacityVal.value, 10) || 0, 0, 100);
    fOpacity.value = v;
    update(l => l.opacity = v / 100);
  });
  fOpacityVal.addEventListener('blur', () => { fOpacityVal.value = String(Math.round((activeLayer()?.opacity ?? 1) * 100)); });
  fAlign.addEventListener('click',   e => {
    const b = e.target.closest('.seg-btn'); if (!b) return;
    fAlign.querySelectorAll('.seg-btn').forEach(x => x.classList.toggle('active', x === b));
    update(l => setLayerAlign(l, b.dataset.v));
  });
  fShadowOn.addEventListener('change',    () => update(l => { if (l.kind !== 'rect') l.shadow.enabled = fShadowOn.checked; }));
  fShadowColor.addEventListener('input',  () => { fShadowColorHex.value = fmtHex(fShadowColor.value); update(l => { if (l.kind !== 'rect') l.shadow.color = fShadowColor.value; }); });
  fShadowColorHex.addEventListener('input', () => {
    const hex = parseHex(fShadowColorHex.value);
    if (hex) { fShadowColor.value = hex; update(l => { if (l.kind !== 'rect') l.shadow.color = hex; }); }
  });
  fShadowColorHex.addEventListener('blur', () => { fShadowColorHex.value = fmtHex(fShadowColor.value); });
  fShadowColorHex.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); fShadowColorHex.blur(); } });
  fShadowBlur.addEventListener('input',   () => { fShadowBlurVal.textContent = fShadowBlur.value; update(l => { if (l.kind !== 'rect') l.shadow.blur = +fShadowBlur.value; }); });
  fShadowOpacity.addEventListener('input', () => { fShadowOpacityVal.value = fShadowOpacity.value; update(l => { if (l.kind !== 'rect') l.shadow.opacity = +fShadowOpacity.value / 100; }); });
  fShadowOpacityVal.addEventListener('input', () => {
    const v = clamp(parseInt(fShadowOpacityVal.value, 10) || 0, 0, 100);
    fShadowOpacity.value = v;
    update(l => { if (l.kind !== 'rect') l.shadow.opacity = v / 100; });
  });
  fShadowOpacityVal.addEventListener('blur', () => { fShadowOpacityVal.value = String(Math.round(((activeLayer()?.shadow?.opacity) ?? 1) * 100)); });
  fRadius.addEventListener('input', () => {
    fRadiusVal.textContent = fRadius.value;
    update(l => { if (l.kind === 'rect') l.radius = +fRadius.value; });
  });
  fLineHeight.addEventListener('input', () => {
    fLineHeightVal.value = fLineHeight.value;
    update(l => { if (l.kind !== 'rect') l.lineHeight = +fLineHeight.value / 100; });
  });
  fLineHeightVal.addEventListener('input', () => {
    const v = clamp(parseInt(fLineHeightVal.value, 10) || 0, 10, 500);
    // Keep the slider showing its own clamp range, but the layer takes the raw value.
    fLineHeight.value = clamp(v, +fLineHeight.min, +fLineHeight.max);
    update(l => { if (l.kind !== 'rect') l.lineHeight = v / 100; });
  });
  fLineHeightVal.addEventListener('blur', () => {
    const pct = Math.round(((activeLayer()?.lineHeight) ?? 0.8) * 100);
    fLineHeightVal.value = String(pct);
  });
}

// ═════════════════════════════════════ Canvas drawing ═════════════════════════════════════
// One draw() function feeds both preview and export — that's the WYSIWYG guarantee.
function draw() {
  const sz = activeSize();
  // Background fill in case the video doesn't fully cover the canvas.
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, sz.w, sz.h);

  // Video frame, drawn per the user-controlled transform.
  if (state.video.loaded && state.video.transform) {
    const t = state.video.transform;
    try { ctx.drawImage(videoEl, t.x, t.y, t.w, t.h); } catch (e) {}
  }

  // Text layers (draw in array order = stacking order). Layers are always
  // visible — no time-range gating.
  for (const layer of state.layers) {
    if (layer.id === inlineEditingLayerId) {
      // Inline textarea is showing the text — don't paint the canvas copy,
      // but still measure so _bbox is current (chrome + floating toolbar
      // need it to stay positioned while the user types).
      drawTextLayer(layer, true);
      continue;
    }
    drawLayer(layer);
  }
  // Selection chrome is DOM (.layer-chrome / .video-chrome); update positions
  // off the freshly computed bboxes so it tracks live edits frame-to-frame.
  if (!state.exporting) updateLayerChrome();
  updateEmptyState();
}

// Show the canvas upload prompt only when there's nothing to see/do yet:
// no video, no layers, the select tool active, and not mid inline-edit.
let _emptyShown = null;
function updateEmptyState() {
  const show = !state.video.loaded && state.layers.length === 0 &&
               state.tool === 'select' && !inlineEditingLayerId;
  if (show === _emptyShown) return;
  _emptyShown = show;
  stage.classList.toggle('empty', show);
}

function drawLayer(layer) {
  if (layer.kind === 'rect')  return drawRectLayer(layer);
  if (layer.kind === 'image') return drawImageLayer(layer);
  return drawTextLayer(layer);
}

// Image cache — src URL → HTMLImageElement. Shared across format clones
// (deep-copied layers keep the same src string, so the cache hit works).
const imageCache = new Map();

function drawImageLayer(layer) {
  layer._bbox = { x: layer.x, y: layer.y, w: layer.w, h: layer.h };
  ctx.save();
  ctx.globalAlpha = layer.opacity;
  if (layer.rotation) {
    const cx = layer.x + layer.w / 2;
    const cy = layer.y + layer.h / 2;
    ctx.translate(cx, cy);
    ctx.rotate(layer.rotation * Math.PI / 180);
    ctx.translate(-cx, -cy);
  }
  const img = imageCache.get(layer.src);
  if (img && img.complete) {
    try { ctx.drawImage(img, layer.x, layer.y, layer.w, layer.h); } catch {}
  }
  ctx.restore();
}

// ─── Rich text: per-range style runs ───────────────────────────────────
// A text layer may carry `runs`: [{ text, weight?, italic?, size?, family?, color? }]
// whose concatenated text === layer.content. Any prop left out inherits the
// layer base (fontFamily / fontWeight / fontSize / color / italic). Layers with
// no run-level variation fall through to the original uniform renderer.
function richHasVariation(layer) {
  const r = layer.runs;
  if (!r || !r.length) return false;
  if (r.length > 1) return true;
  const o = r[0];
  return o.weight != null || o.italic != null || o.size != null || o.family != null || o.color != null;
}
function layerRuns(layer) {
  return (layer.runs && layer.runs.length) ? layer.runs : [{ text: layer.content || '' }];
}
function runStyle(layer, r) {
  return {
    family: r.family || layer.fontFamily,
    weight: r.weight != null ? r.weight : layer.fontWeight,
    italic: r.italic != null ? r.italic : !!layer.italic,
    size:   r.size   != null ? r.size   : layer.fontSize,
    color:  r.color  || layer.color,
  };
}
function layerPlainText(layer) { return layerRuns(layer).map(r => r.text).join(''); }
function syncContent(layer) { layer.content = layerPlainText(layer); }
function fontCss(st) {
  const fam = st.family.includes(' ') && !/['",]/.test(st.family) ? `"${st.family}"` : st.family;
  return `${st.italic ? 'italic ' : ''}${st.weight} ${st.size}px ${fam}, system-ui, sans-serif`;
}

// Lay out a rich layer into lines of styled pieces (top-aligned, mixed sizes
// allowed). Hard-breaks on '\n'; soft-wraps at spaces when maxWidth is set.
function layoutText(layer) {
  const lh = layer.lineHeight ?? 0.8;
  const pieces = [];
  for (const r of layerRuns(layer)) {
    const st = runStyle(layer, r);
    for (const p of String(r.text).split(/(\n| )/)) { if (p !== '') pieces.push({ text: p, st }); }
  }
  const lines = [];
  let cur = [], curW = 0, afterSpace = true;
  const closeLine = () => { lines.push(cur); cur = []; curW = 0; };
  for (const pc of pieces) {
    if (pc.text === '\n') { closeLine(); afterSpace = true; continue; }
    ctx.font = fontCss(pc.st);
    const w = ctx.measureText(pc.text).width;
    const isSpace = pc.text === ' ';
    if (layer.maxWidth && !isSpace && afterSpace && cur.length && curW + w > layer.maxWidth) {
      if (cur.length && cur[cur.length - 1].text === ' ') { curW -= cur[cur.length - 1].w; cur.pop(); }
      closeLine(); afterSpace = true;
    }
    if (isSpace && (afterSpace || !cur.length)) { afterSpace = true; continue; }
    cur.push({ text: pc.text, st: pc.st, w }); curW += w; afterSpace = isSpace;
  }
  closeLine();
  if (!lines.length) lines.push([]);
  let maxW = 0;
  const out = lines.map(line => {
    let width = 0, maxSize = 0;
    for (const p of line) { width += p.w; if (p.st.size > maxSize) maxSize = p.st.size; }
    if (!line.length) maxSize = layer.fontSize;
    if (width > maxW) maxW = width;
    return { pieces: line, width, maxSize };
  });
  const totalH = out.reduce((s, l) => s + l.maxSize * lh, 0);
  const lastSize = out[out.length - 1].maxSize;
  const descenderPad = Math.max(0, lastSize - lastSize * lh);
  const effW = layer.maxWidth || maxW;
  const effH = layer.boxHeight || (totalH + descenderPad);
  const bx = layer.align === 'left' ? layer.x : layer.align === 'right' ? layer.x - effW : layer.x - effW / 2;
  return { lines: out, effW, effH, bx };
}

function drawRichTextLayer(layer, measureOnly) {
  const L = layoutText(layer);
  layer._bbox = { x: L.bx, y: layer.y, w: L.effW, h: L.effH };
  if (measureOnly) return;
  ctx.save();
  ctx.globalAlpha = layer.opacity;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  if (layer.rotation) {
    const cx = L.bx + L.effW / 2, cy = layer.y + L.effH / 2;
    ctx.translate(cx, cy); ctx.rotate(layer.rotation * Math.PI / 180); ctx.translate(-cx, -cy);
  }
  if (layer.shadow && layer.shadow.enabled) {
    ctx.shadowColor = shadowRgba(layer.shadow.color, layer.shadow.opacity ?? 1);
    ctx.shadowBlur = layer.shadow.blur; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  }
  const lh = layer.lineHeight ?? 0.8;
  let y = layer.y;
  for (const line of L.lines) {
    let x = layer.align === 'left' ? layer.x : layer.align === 'right' ? layer.x - line.width : layer.x - line.width / 2;
    for (const p of line.pieces) {
      ctx.font = fontCss(p.st);
      ctx.fillStyle = p.st.color;
      ctx.fillText(p.text, x, y);
      x += p.w;
    }
    y += line.maxSize * lh;
  }
  ctx.restore();
}

// Word-wrap content within maxWidth. Preserves explicit \n. Long single words
// are placed on their own line and may overflow if they exceed the box.
function wrapTextLines(text, maxWidth) {
  const out = [];
  for (const para of String(text || '').split('\n')) {
    if (!para) { out.push(''); continue; }
    const words = para.split(' ');
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && line) {
        out.push(line);
        line = word;
      } else {
        line = test;
      }
    }
    out.push(line);
  }
  return out;
}

function drawTextLayer(layer, measureOnly) {
  if (richHasVariation(layer)) return drawRichTextLayer(layer, measureOnly);
  const fontFamily = layer.fontFamily.includes(' ') && !/['",]/.test(layer.fontFamily)
    ? `"${layer.fontFamily}"`
    : layer.fontFamily;
  ctx.save();
  ctx.font = `${layer.italic ? 'italic ' : ''}${layer.fontWeight} ${layer.fontSize}px ${fontFamily}, system-ui, sans-serif`;
  ctx.textBaseline = 'top';
  ctx.textAlign = layer.align;
  ctx.globalAlpha = layer.opacity;

  // maxWidth = constrained text box (text-tool drag). Without it, the layer
  // is unbounded and content lines are split only on \n.
  const lines = layer.maxWidth
    ? wrapTextLines(layer.content, layer.maxWidth)
    : String(layer.content || '').split('\n');

  const lineH = layer.fontSize * (layer.lineHeight ?? 0.8);
  let measuredMaxW = 0;
  for (const line of lines) {
    const w = ctx.measureText(line).width;
    if (w > measuredMaxW) measuredMaxW = w;
  }
  const totalH = lineH * lines.length;
  // When line-height is tight (< 1) the last line's descender (g/p/y) sticks
  // out below `lineH × lines`. Pad the bbox so it covers actual glyph extent
  // — otherwise the inline editor's overflow clips descenders while typing.
  const descenderPad = Math.max(0, layer.fontSize - lineH);
  const visualH = totalH + descenderPad;

  // Effective bbox width: the explicit constraint when set (so the user
  // sees the text box they drew), otherwise the actual measured extent.
  // Effective bbox height: the explicit boxHeight if the user drew a box,
  // otherwise the natural text extent (incl. descender padding).
  const effW = layer.maxWidth  || measuredMaxW;
  const effH = layer.boxHeight || visualH;
  const bx = layer.align === 'left'  ? layer.x
           : layer.align === 'right' ? layer.x - effW
           :                            layer.x - effW / 2;
  layer._bbox = { x: bx, y: layer.y, w: effW, h: effH };
  // Measure-only: bbox is enough (e.g. inline editing is showing the textarea
  // on top of this layer and we just need positioning info for the toolbar).
  if (measureOnly) { ctx.restore(); return; }

  // Apply rotation around the bbox centre AFTER measurement so _bbox stays
  // axis-aligned in local coords; hit-test inverse-transforms.
  if (layer.rotation) {
    const cx = bx + effW / 2;
    const cy = layer.y + effH / 2;
    ctx.translate(cx, cy);
    ctx.rotate(layer.rotation * Math.PI / 180);
    ctx.translate(-cx, -cy);
  }

  if (layer.shadow && layer.shadow.enabled) {
    ctx.shadowColor = shadowRgba(layer.shadow.color, layer.shadow.opacity ?? 1);
    ctx.shadowBlur  = layer.shadow.blur;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
  }

  ctx.fillStyle = layer.color;
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], layer.x, layer.y + i * lineH);
  }
  ctx.restore();
}

function drawRectLayer(layer) {
  layer._bbox = { x: layer.x, y: layer.y, w: layer.w, h: layer.h };
  ctx.save();
  ctx.globalAlpha = layer.opacity;
  if (layer.rotation) {
    const cx = layer.x + layer.w / 2;
    const cy = layer.y + layer.h / 2;
    ctx.translate(cx, cy);
    ctx.rotate(layer.rotation * Math.PI / 180);
    ctx.translate(-cx, -cy);
  }
  ctx.fillStyle = layer.color;
  if (layer.radius > 0) {
    drawRoundRect(ctx, layer.x, layer.y, layer.w, layer.h, layer.radius);
    ctx.fill();
  } else {
    ctx.fillRect(layer.x, layer.y, layer.w, layer.h);
  }
  ctx.restore();
}

function drawRoundRect(ctx, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}


function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

// Hex parsing / formatting. Accepts "#RGB", "#RRGGBB", with or without "#".
// Returns a normalized "#RRGGBB" string or null if invalid.
function parseHex(s) {
  if (!s) return null;
  let t = String(s).trim().replace(/^#/, '');
  if (/^[0-9a-f]{3}$/i.test(t)) t = t.split('').map(c => c + c).join('');
  if (/^[0-9a-f]{6}$/i.test(t)) return '#' + t.toUpperCase();
  return null;
}
function fmtHex(s) { return parseHex(s) || '#FFFFFF'; }
// Compose an rgba() string from a #RRGGBB hex + alpha (0..1) — used so the
// drop-shadow opacity is independent of the shadow's hex colour.
function shadowRgba(hex, alpha) {
  const h = parseHex(hex) || '#000000';
  const r = parseInt(h.slice(1, 3), 16);
  const g = parseInt(h.slice(3, 5), 16);
  const b = parseInt(h.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${Math.max(0, Math.min(1, alpha))})`;
}

// Sample a small neighbourhood of the canvas at (cx, cy) — average the
// luminance and return white on a dark patch, black on a light patch. Used
// to pick a sensible default colour for newly-added text. Safe to call any
// time after the rAF loop has drawn at least one frame.
function contrastingTextColor(cx, cy) {
  try {
    const SAMPLE = 11;
    const half = (SAMPLE - 1) / 2;
    const sx = clamp(Math.round(cx - half), 0, canvas.width  - SAMPLE);
    const sy = clamp(Math.round(cy - half), 0, canvas.height - SAMPLE);
    const data = ctx.getImageData(sx, sy, SAMPLE, SAMPLE).data;
    let sum = 0;
    for (let i = 0; i < data.length; i += 4) {
      // Rec. 601 luma — good enough for "is this dark or light"
      sum += 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    }
    const avg = sum / (data.length / 4);
    return avg < 128 ? '#ffffff' : '#000000';
  } catch {
    return '#ffffff';
  }
}

// ═════════════════════════════════════ Video transform helpers ═════════════════════════════════════
function fitVideoCover() {
  if (!state.video.naturalW || !state.video.naturalH) {
    state.video.transform = null;
  } else {
    const sz = activeSize();
    const sw = state.video.naturalW, sh = state.video.naturalH;
    const scale = Math.max(sz.w / sw, sz.h / sh);
    const w = sw * scale, h = sh * scale;
    state.video.transform = { x: (sz.w - w) / 2, y: (sz.h - h) / 2, w, h };
  }
  // Reassignment — sync the new object back into the current format slot
  // so the per-format memory stays consistent.
  if (state.formats[state.sizeId]) state.formats[state.sizeId].videoTransform = state.video.transform;
}

// Each selection helper pushes a (debounced) undo entry so undo/redo
// retraces the user's selection history alongside their edits.
function selectionChanged() {
  pushUndo('select');
}
function selectVideo() {
  if (state.videoSelected && !state.selectedLayerIds.length) return; // no change
  selectionChanged();
  state.videoSelected = true;
  state.selectedLayerIds = [];
  state.activeLayerId = null;
  refreshLayerList();
  syncEditPanel();
  updateVideoChrome();
  updateTextToolbar();
}
function selectLayer(id) {
  // No-op if it's already the single primary selection.
  if (!state.videoSelected && state.selectedLayerIds.length === 1 && state.selectedLayerIds[0] === id) return;
  selectionChanged();
  state.selectedLayerIds = [id];
  state.activeLayerId = id;
  state.videoSelected = false;
  refreshLayerList();
  syncEditPanel();
  updateVideoChrome();
  draw();
  updateTextToolbar();
}
function toggleLayerSelection(id) {
  selectionChanged();
  state.videoSelected = false;
  const idx = state.selectedLayerIds.indexOf(id);
  if (idx >= 0) {
    state.selectedLayerIds.splice(idx, 1);
  } else {
    state.selectedLayerIds.push(id);
  }
  state.activeLayerId = state.selectedLayerIds[state.selectedLayerIds.length - 1] || null;
  refreshLayerList();
  syncEditPanel();
  updateVideoChrome();
  draw();
  updateTextToolbar();
}
function isLayerSelected(id) { return state.selectedLayerIds.indexOf(id) >= 0; }
function deselectAll() {
  if (!state.videoSelected && !state.selectedLayerIds.length) return;
  selectionChanged();
  state.videoSelected = false;
  state.selectedLayerIds = [];
  state.activeLayerId = null;
  refreshLayerList();
  syncEditPanel();
  updateVideoChrome();
  updateTextToolbar();
  hideGuides();
}

function updateVideoChrome() {
  const t = state.video.transform;
  if (!state.videoSelected || !t) {
    videoChrome.classList.add('hidden');
    return;
  }
  videoChrome.classList.remove('hidden');
  videoChrome.style.left   = (t.x * viewScale) + 'px';
  videoChrome.style.top    = (t.y * viewScale) + 'px';
  videoChrome.style.width  = (t.w * viewScale) + 'px';
  videoChrome.style.height = (t.h * viewScale) + 'px';
}

// Selection chrome for the active text/rect layer. Sits over the layer's
// bbox (which drawLayer() computed in canvas coords). Edge handles are
// hidden via CSS for text layers; corner handles scale the font there.
function updateLayerChrome() {
  const layer = activeLayer();
  // Keep the chrome visible during inline edit so it still wraps the bbox.
  if (!layer || state.videoSelected) {
    layerChrome.classList.add('hidden');
    return;
  }
  // Compute the bbox to draw the chrome around:
  //   single-select → the layer's own bbox (with full resize handles)
  //   multi-select  → union of every selected layer's bbox (corners only)
  let b;
  const multi = state.selectedLayerIds.length > 1;
  if (multi) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const id of state.selectedLayerIds) {
      const ly = state.layers.find(x => x.id === id);
      if (!ly || !ly._bbox) continue;
      const bb = ly._bbox;
      if (bb.x < minX) minX = bb.x;
      if (bb.y < minY) minY = bb.y;
      if (bb.x + bb.w > maxX) maxX = bb.x + bb.w;
      if (bb.y + bb.h > maxY) maxY = bb.y + bb.h;
    }
    if (!isFinite(minX)) { layerChrome.classList.add('hidden'); return; }
    b = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  } else {
    if (!layer._bbox) { layerChrome.classList.add('hidden'); return; }
    b = layer._bbox;
  }
  layerChrome.classList.remove('hidden');
  layerChrome.classList.toggle('kind-text',  !multi && layer.kind === 'text');
  layerChrome.classList.toggle('kind-rect',  !multi && layer.kind === 'rect');
  layerChrome.classList.toggle('kind-image', !multi && layer.kind === 'image');
  layerChrome.classList.toggle('multi', multi);
  // Text WITH a maxWidth-constrained box uses the rect-style 8-handle resize
  // (changes the box, not the font). Reflected via .has-box so CSS shows edges.
  layerChrome.classList.toggle('has-box', !multi && layer.kind === 'text' && layer.maxWidth != null);
  const rot = (!multi && layer.rotation) ? layer.rotation : 0;
  layerChrome.classList.toggle('rotated', rot !== 0);
  layerChrome.style.left   = (b.x * viewScale) + 'px';
  layerChrome.style.top    = (b.y * viewScale) + 'px';
  layerChrome.style.width  = (b.w * viewScale) + 'px';
  layerChrome.style.height = (b.h * viewScale) + 'px';
  layerChrome.style.transform       = rot ? `rotate(${rot}deg)` : '';
  layerChrome.style.transformOrigin = 'center';
  applyHandleCursorsForRotation(rot);
}

// CSS cursors don't rotate with the chrome. Pick the standard cursor that
// matches each handle's resize axis once the chrome has been rotated.
function applyHandleCursorsForRotation(rotation) {
  // Each handle's natural resize-axis direction in degrees (0=horizontal,
  // 90=vertical, 45=NE-SW diagonal, 135=NW-SE diagonal).
  const baseAxis = { nw: 135, ne: 45, se: 135, sw: 45, n: 90, s: 90, w: 0, e: 0 };
  // Cursors indexed by axis / 45 (snapped to nearest 45°): 0=ew, 1=nesw, 2=ns, 3=nwse.
  const cursors = ['ew-resize', 'nesw-resize', 'ns-resize', 'nwse-resize'];
  for (const h of layerHandles) {
    const base = baseAxis[h.dataset.corner] || 0;
    let axis = (base + rotation) % 180;
    if (axis < 0) axis += 180;
    h.style.cursor = cursors[Math.round(axis / 45) % 4];
  }
}

// Wire handle pointerdowns ONCE on init (handles are static).
layerHandles.forEach(h => {
  h.addEventListener('pointerdown', e => {
    const layer = activeLayer();
    if (!layer || !layer._bbox) return;
    e.preventDefault();
    e.stopPropagation();
    // Multi-selection: uniform-scale every selected layer (sizes AND positions
    // relative to the opposite corner of the union bbox).
    if (state.selectedLayerIds.length > 1) {
      pushUndo();
      const union = computeUnionBbox(state.selectedLayerIds);
      const snapshots = state.selectedLayerIds.map(id => {
        const l = state.layers.find(x => x.id === id);
        if (!l) return null;
        return {
          id, kind: l.kind,
          x: l.x, y: l.y,
          w: l.w, h: l.h,
          fontSize: l.fontSize,
          maxWidth: l.maxWidth, boxHeight: l.boxHeight,
        };
      }).filter(Boolean);
      canvasDrag = {
        kind: 'multi-resize',
        corner: h.dataset.corner,
        startClientX: e.clientX, startClientY: e.clientY,
        union, snapshots,
        pointerId: e.pointerId,
        target: h,
      };
      try { h.setPointerCapture(e.pointerId); } catch {}
      return;
    }
    pushUndo();
    canvasDrag = {
      kind: 'layer-resize',
      layerId: layer.id,
      corner: h.dataset.corner,
      startClientX: e.clientX, startClientY: e.clientY,
      startBbox: { ...layer._bbox },
      // Snapshot whatever mutable state determines that bbox so we can re-derive.
      snapshot: (layer.kind === 'rect' || layer.kind === 'image')
        ? { x: layer.x, y: layer.y, w: layer.w, h: layer.h }
        : { x: layer.x, y: layer.y, fontSize: layer.fontSize, align: layer.align,
            maxWidth: layer.maxWidth, boxHeight: layer.boxHeight,
            runs: layer.runs ? JSON.parse(JSON.stringify(layer.runs)) : null },
      pointerId: e.pointerId,
      target: h,
    };
    try { h.setPointerCapture(e.pointerId); } catch {}
    updateTextToolbar();   // hides during drag
  });
});

// Rotate grips — drag rotates around the bbox centre. Holding Shift snaps
// to 15° increments (Figma convention).
rotateGrips.forEach(g => {
  g.addEventListener('pointerdown', e => {
    const layer = activeLayer();
    if (!layer || !layer._bbox) return;
    e.preventDefault();
    e.stopPropagation();
    pushUndo();
    const sz = activeSize();
    const r = canvas.getBoundingClientRect();
    // Multi-selection rotates the whole group about the union centre.
    if (state.selectedLayerIds.length > 1) {
      const union = computeUnionBbox(state.selectedLayerIds);
      const groupCx = union.x + union.w / 2;
      const groupCy = union.y + union.h / 2;
      const cxScreen = r.left + groupCx * (r.width  / sz.w);
      const cyScreen = r.top  + groupCy * (r.height / sz.h);
      const snapshots = state.selectedLayerIds.map(id => {
        const l = state.layers.find(x => x.id === id);
        if (!l || !l._bbox) return null;
        return {
          id,
          x: l.x, y: l.y,
          rotation: l.rotation || 0,
          bbox: { x: l._bbox.x, y: l._bbox.y, w: l._bbox.w, h: l._bbox.h },
        };
      }).filter(Boolean);
      canvasDrag = {
        kind: 'multi-rotate',
        cxScreen, cyScreen,
        groupCx, groupCy,
        startAngle: Math.atan2(e.clientY - cyScreen, e.clientX - cxScreen),
        snapshots,
        pointerId: e.pointerId,
        target: g,
      };
      try { g.setPointerCapture(e.pointerId); } catch {}
      return;
    }
    // Single-layer rotation: about the layer's own bbox centre.
    const b = layer._bbox;
    const cxScreen = r.left + (b.x + b.w / 2) * (r.width  / sz.w);
    const cyScreen = r.top  + (b.y + b.h / 2) * (r.height / sz.h);
    canvasDrag = {
      kind: 'layer-rotate',
      layerId: layer.id,
      cxScreen, cyScreen,
      startAngle:   Math.atan2(e.clientY - cyScreen, e.clientX - cxScreen),
      startRotation: layer.rotation || 0,
      pointerId: e.pointerId,
      target: g,
    };
    try { g.setPointerCapture(e.pointerId); } catch {}
  });
});

// Floating contextual text toolbar — appears above the selected layer's
// bbox; flips below when there isn't enough room above. Hides during drag.
function updateTextToolbar() {
  const layer = activeLayer();
  // Only show for TEXT layers — rect layers use sidebar controls.
  const visible = layer && layer.kind === 'text' && !state.videoSelected && !!layer._bbox && !canvasDrag;
  if (!visible) {
    textToolbar.classList.add('hidden');
    return;
  }
  // Sync control values from the current layer.
  ttSize.value  = layer.fontSize;
  ttColor.value = layer.color;
  if (document.activeElement !== ttColorHex) ttColorHex.value = fmtHex(layer.color);
  ttAlign.querySelectorAll('.tt-btn').forEach(b => b.classList.toggle('active', b.dataset.v === layer.align));

  textToolbar.classList.remove('hidden');
  syncFontControls();

  // Position: above bbox, or below if too close to the top of the canvas.
  const b = layer._bbox;
  const tw = textToolbar.offsetWidth  || 280;
  const th = textToolbar.offsetHeight || 32;
  const stageTop  = stage.offsetTop;
  const stageLeft = stage.offsetLeft;
  const bboxTop = stageTop + b.y * viewScale;
  const bboxBot = stageTop + (b.y + b.h) * viewScale;
  const bboxCx  = stageLeft + (b.x + b.w / 2) * viewScale;

  const gap = 10;
  let top = bboxTop - th - gap;
  if (top < 6) top = bboxBot + gap;       // flip below
  let left = bboxCx - tw / 2;
  // Keep within canvas-area's content box.
  const maxLeft = canvasArea.clientWidth - tw - 6;
  left = Math.max(6, Math.min(left, maxLeft));

  textToolbar.style.left = left + 'px';
  textToolbar.style.top  = top + 'px';
}

// Click-to-step / drag-to-scrub arrows. The arrows column is the pointer-event
// target (arrow buttons themselves have pointer-events: none) so we can
// classify down→up without movement as a "click on the up/down half".
function bindScrubArrows(el, opts) {
  let drag = null;
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    const rect = el.getBoundingClientRect();
    const upHalf = (e.clientY - rect.top) < rect.height / 2;
    drag = {
      startY: e.clientY,
      startVal: opts.get(),
      moved: false,
      direction: upHalf ? +1 : -1,
      pointerId: e.pointerId,
    };
    try { el.setPointerCapture(e.pointerId); } catch {}
  });
  el.addEventListener('pointermove', e => {
    if (!drag) return;
    const dy = drag.startY - e.clientY;  // up-positive
    if (!drag.moved && Math.abs(dy) > 3) drag.moved = true;
    if (!drag.moved) return;
    const fast = e.shiftKey ? 4 : 1;
    const delta = Math.round((dy * fast) / (opts.pxPerUnit || 2));
    const next = clamp(drag.startVal + delta, opts.min, opts.max);
    if (next !== opts.get()) opts.set(next);
  });
  const finish = (e) => {
    if (!drag) return;
    try { el.releasePointerCapture(drag.pointerId); } catch {}
    if (!drag.moved) {
      const step = (e.shiftKey ? 10 : 1) * drag.direction;
      const next = clamp(drag.startVal + step, opts.min, opts.max);
      opts.set(next);
    }
    drag = null;
  };
  el.addEventListener('pointerup', finish);
  el.addEventListener('pointercancel', () => { drag = null; });
}

// ─── Font picker (family list with hover-to-weight flyout) ──────────────
// One menu lives in <body>; we point it at whichever picker button opened it
// and route the selection back through the supplied onSelect callback.
let fontMenu = null;
let weightMenu = null;
let activeFontBtn = null;
let activeFontCtx = null;          // { onSelect, getCurrent }

function setFontPickerBtn(btn, family, weight) {
  const fam = btn.querySelector('.fp-fam');
  const wt  = btn.querySelector('.fp-wt');
  if (fam) fam.textContent = family;
  if (wt)  wt.textContent  = weightLabel(family, weight);
  // Render the button's own font in its own family so it previews.
  btn.style.fontFamily = `"${family}", system-ui, sans-serif`;
}

function mountFontPicker(btn, ctx) {
  // ctx: { onSelect: (family, weight) => void, getCurrent: () => ({family, weight}) }
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (activeFontBtn === btn) { closeFontMenu(); return; }
    openFontMenu(btn, ctx);
  });
}

function openFontMenu(btn, ctx) {
  closeFontMenu();
  activeFontBtn = btn;
  activeFontCtx = ctx;
  const cur = ctx.getCurrent();
  fontMenu = document.createElement('div');
  fontMenu.className = 'font-menu';
  for (const item of FONT_CATALOG) {
    const row = document.createElement('div');
    row.className = 'font-row' + (item.family === cur.family ? ' active' : '');
    row.dataset.family = item.family;
    row.innerHTML = `
      <span class="check">${item.family === cur.family ? '✓' : ''}</span>
      <span class="name" style="font-family:'${item.family}', system-ui, sans-serif">${item.family}</span>
      <span class="arrow">›</span>
    `;
    row.addEventListener('mouseenter', () => openWeightMenu(item, row));
    row.addEventListener('click', () => openWeightMenu(item, row));
    fontMenu.appendChild(row);
  }
  document.body.appendChild(fontMenu);
  const r = btn.getBoundingClientRect();
  // Position menu below the button, clamped to the viewport.
  const mw = fontMenu.offsetWidth;
  const mh = fontMenu.offsetHeight;
  let left = r.left;
  let top  = r.bottom + 4;
  if (left + mw > window.innerWidth - 8)  left = window.innerWidth - mw - 8;
  if (top  + mh > window.innerHeight - 8) top  = r.top - mh - 4;     // flip above
  fontMenu.style.left = Math.max(8, left) + 'px';
  fontMenu.style.top  = Math.max(8, top)  + 'px';
  // Open the weights flyout for the active family by default.
  const activeRow = fontMenu.querySelector('.font-row.active');
  if (activeRow) openWeightMenu(fontEntry(cur.family), activeRow);
  // Close on outside click / Escape.
  setTimeout(() => {
    document.addEventListener('mousedown', fontMenuOutside, true);
    document.addEventListener('keydown',   fontMenuKeydown);
  }, 0);
}

function openWeightMenu(item, fromRow) {
  if (weightMenu) weightMenu.remove();
  weightMenu = document.createElement('div');
  weightMenu.className = 'font-weights-menu';
  const cur = activeFontCtx.getCurrent();
  for (const w of item.weights) {
    const wr = document.createElement('div');
    const isActive = item.family === cur.family && w.v === cur.weight;
    wr.className = 'weight-row' + (isActive ? ' active' : '');
    wr.innerHTML = `<span class="check">${isActive ? '✓' : ''}</span><span class="label">${w.n}</span>`;
    wr.style.fontWeight = String(w.v);
    wr.style.fontFamily = `'${item.family}', system-ui, sans-serif`;
    wr.addEventListener('click', () => {
      activeFontCtx.onSelect(item.family, w.v);
      closeFontMenu();
    });
    weightMenu.appendChild(wr);
  }
  document.body.appendChild(weightMenu);
  // Mark the source row as the active family so user sees current selection.
  if (fontMenu) {
    fontMenu.querySelectorAll('.font-row').forEach(r => {
      const isFam = r.dataset.family === item.family;
      r.classList.toggle('open', isFam);
    });
  }
  const r = fromRow.getBoundingClientRect();
  const ww = weightMenu.offsetWidth;
  let left = r.right + 4;
  let top = r.top;
  if (left + ww > window.innerWidth - 8) left = r.left - ww - 4; // flip left
  if (top + weightMenu.offsetHeight > window.innerHeight - 8) {
    top = window.innerHeight - weightMenu.offsetHeight - 8;
  }
  weightMenu.style.left = Math.max(8, left) + 'px';
  weightMenu.style.top  = Math.max(8, top)  + 'px';
}

function fontMenuOutside(e) {
  if (fontMenu   && fontMenu.contains(e.target))   return;
  if (weightMenu && weightMenu.contains(e.target)) return;
  if (activeFontBtn && activeFontBtn.contains(e.target)) return;
  closeFontMenu();
}
function fontMenuKeydown(e) {
  if (e.key === 'Escape') { e.preventDefault(); closeFontMenu(); }
}
function closeFontMenu() {
  if (fontMenu)   fontMenu.remove();
  if (weightMenu) weightMenu.remove();
  fontMenu = weightMenu = null;
  activeFontBtn = null;
  activeFontCtx = null;
  document.removeEventListener('mousedown', fontMenuOutside, true);
  document.removeEventListener('keydown',   fontMenuKeydown);
}

// Current family + weight of the target (in-editor selection, else the layer).
function currentFontStyle() {
  const sel = currentEditSelection();
  const l = inlineEditingLayerId ? state.layers.find(x => x.id === inlineEditingLayerId) : activeLayer();
  if (!l || l.kind === 'rect') return { family: 'MB Empire', weight: 700 };
  if (sel && sel.b > sel.a) { const st = effectiveStyleAt(l, sel.a); return { family: st.family, weight: st.weight }; }
  return { family: l.fontFamily, weight: l.fontWeight };
}
function rebuildWeightOptions(family, weight) {
  const ws = fontEntry(family).weights;
  const want = ws.some(w => w.v === weight) ? weight : nearestWeight(family, weight);
  ttWeight.innerHTML = ws.map(w => `<option value="${w.v}">${w.n}</option>`).join('');
  ttWeight.value = String(want);
}
// Reflect the current family + weight in the two toolbar dropdowns.
function syncFontControls() {
  if (!ttFamily || !ttWeight || textToolbar.classList.contains('hidden')) return;
  const cur = currentFontStyle();
  ttFamily.value = cur.family;
  rebuildWeightOptions(cur.family, cur.weight);
}

function bindTextToolbar() {
  // Size / colour / font / bold / italic route through applyTextStyle, which
  // targets the in-editor selection when one exists, else the whole layer.
  ttSize.addEventListener('input', () => {
    const v = parseInt(ttSize.value, 10);
    if (!isFinite(v) || v < 1) return;
    applyTextStyle({ size: v });
  });
  // Spinner arrows: click to step ±1 (Shift = ±10); pointer-down + vertical drag = scrub.
  bindScrubArrows(ttSizeArrows, {
    min: 1, max: 2000, pxPerUnit: 2,
    get: () => +ttSize.value || activeLayer()?.fontSize || 64,
    set: (v) => { ttSize.value = v; applyTextStyle({ size: v }); },
  });
  ttColor.addEventListener('input', () => { ttColorHex.value = fmtHex(ttColor.value); applyTextStyle({ color: ttColor.value }); });
  ttColorHex.addEventListener('input', () => { const hex = parseHex(ttColorHex.value); if (hex) { ttColor.value = hex; applyTextStyle({ color: hex }); } });
  ttColorHex.addEventListener('blur', () => { ttColorHex.value = fmtHex(ttColor.value); });
  ttColorHex.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); ttColorHex.blur(); } });
  // Alignment is paragraph-level → always the whole layer.
  ttAlign.addEventListener('click', e => {
    const b = e.target.closest('.tt-btn'); if (!b) return;
    if (!state.selectedLayerIds.length) return;
    pushUndo('toolbar-edit');
    for (const id of state.selectedLayerIds) { const l = state.layers.find(x => x.id === id); if (l && l.kind !== 'rect') setLayerAlign(l, b.dataset.v); }
    refreshLayerList(); draw(); syncEditPanel(); updateTextToolbar();
  });
  // Font family + weight dropdowns — selection-aware via applyTextStyle, so a
  // selected word can take its own family/weight. Switching family snaps the
  // weight to the nearest one that family actually has.
  ttFamily.innerHTML = FONT_CATALOG.map(f => `<option value="${f.family}" style="font-family:'${f.family}', system-ui, sans-serif">${f.family}</option>`).join('');
  ttFamily.addEventListener('change', () => {
    const fam = ttFamily.value;
    applyTextStyle({ family: fam, weight: nearestWeight(fam, currentFontStyle().weight) });
  });
  ttWeight.addEventListener('change', () => applyTextStyle({ weight: parseInt(ttWeight.value, 10) }));
}

// ═════════════════════════════════════ Smart guides (snap to canvas edges/centre) ═════════════════════════════════════
function showGuideV(canvasX) {
  guideV.style.left = (canvasX * viewScale) + 'px';
  guideV.classList.remove('hidden');
}
function showGuideH(canvasY) {
  guideH.style.top = (canvasY * viewScale) + 'px';
  guideH.classList.remove('hidden');
}
function hideGuideV() { guideV.classList.add('hidden'); }
function hideGuideH() { guideH.classList.add('hidden'); }
function hideGuides() { hideGuideV(); hideGuideH(); }

// ─── Undo / redo ─────────────────────────────────────────────────────────
// Snapshots capture the WHOLE document — every per-format slot, the active
// size, and the trim range. Selection state is ephemeral and not stored, so
// undoing also clears selection (predictable: same as reload-and-pick-up).
const undoStack = [];
const redoStack = [];
const UNDO_MAX = 100;
const UNDO_DEBOUNCE_MS = 600;
let lastUndoKey = null;
let lastUndoTime = 0;

function snapshotDoc() {
  // Flush working state into its slot first so it's captured.
  saveCurrentFormatSlot();
  return {
    sizeId:           state.sizeId,
    formats:          JSON.parse(JSON.stringify(state.formats)),
    trimStart:        state.trimStart,
    trimEnd:          state.trimEnd,
    masterFormat:     state.masterFormat,
    // Selection is part of the user's editing context — undo/redo should
    // restore the same set of selected items so the next action lands on
    // what they expect.
    selection: {
      videoSelected:    state.videoSelected,
      activeLayerId:    state.activeLayerId,
      selectedLayerIds: state.selectedLayerIds.slice(),
    },
  };
}
function restoreSnapshot(snap) {
  state.sizeId       = snap.sizeId;
  state.formats      = JSON.parse(JSON.stringify(snap.formats));
  state.trimStart    = snap.trimStart;
  state.trimEnd      = snap.trimEnd;
  state.masterFormat = snap.masterFormat || null;
  const slot = state.formats[state.sizeId] || (state.formats[state.sizeId] = { layers: [], videoTransform: null });
  state.layers          = slot.layers;
  state.video.transform = slot.videoTransform;
  // Restore selection, but only ids that still exist in the current slot.
  const sel = snap.selection || { videoSelected: false, activeLayerId: null, selectedLayerIds: [] };
  const exist = new Set(state.layers.map(l => l.id));
  state.selectedLayerIds = sel.selectedLayerIds.filter(id => exist.has(id));
  state.activeLayerId   = exist.has(sel.activeLayerId) ? sel.activeLayerId : (state.selectedLayerIds[state.selectedLayerIds.length - 1] || null);
  state.videoSelected   = !!sel.videoSelected;
  sizeGrid.querySelectorAll('.size-card').forEach(b => {
    const on = b.dataset.id === state.sizeId;
    b.classList.toggle('active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  applySizeToCanvas();
  refreshLayerList();
  syncEditPanel();
  updateVideoChrome();
  updateTextToolbar();
  updateTrimOverlay();
  draw();
  // Reset debounce window so the next user edit pushes a fresh entry.
  lastUndoKey = null; lastUndoTime = 0;
}

// `key` collapses consecutive same-keyed edits (e.g. dragging a slider)
// into one undo entry within UNDO_DEBOUNCE_MS. Omit `key` to never collapse.
function pushUndo(key) {
  const now = Date.now();
  if (key && key === lastUndoKey && (now - lastUndoTime) < UNDO_DEBOUNCE_MS) {
    lastUndoTime = now;
    return;
  }
  undoStack.push(snapshotDoc());
  if (undoStack.length > UNDO_MAX) undoStack.shift();
  redoStack.length = 0;
  lastUndoKey = key || null;
  lastUndoTime = now;
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(snapshotDoc());
  restoreSnapshot(undoStack.pop());
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(snapshotDoc());
  restoreSnapshot(redoStack.pop());
}

// ─── Generalized snap targets ───────────────────────────────────────────
// excludeId: 'video' to exclude the video transform; otherwise a layer id.
// Returns the X- and Y-axis line positions that the moving/resizing element
// should snap to: canvas edges + center, every other layer's left/centre/
// right (or top/middle/bottom), and the video's edges if not excluded.
// excludeId can be a single id string ('video' or a layer id) OR a Set of
// ids to exclude (used when snapping a multi-selection: every selected
// layer is excluded so the group doesn't snap to itself).
function _isExcluded(exclude, id) {
  return exclude instanceof Set ? exclude.has(id) : exclude === id;
}
function getXSnapTargets(exclude) {
  const sz = activeSize();
  const out = [0, sz.w / 2, sz.w];
  for (const l of state.layers) {
    if (!l._bbox || _isExcluded(exclude, l.id)) continue;
    const b = l._bbox;
    out.push(b.x, b.x + b.w / 2, b.x + b.w);
  }
  if (!_isExcluded(exclude, 'video') && state.video.transform) {
    const t = state.video.transform;
    out.push(t.x, t.x + t.w / 2, t.x + t.w);
  }
  return out;
}
function getYSnapTargets(exclude) {
  const sz = activeSize();
  const out = [0, sz.h / 2, sz.h];
  for (const l of state.layers) {
    if (!l._bbox || _isExcluded(exclude, l.id)) continue;
    const b = l._bbox;
    out.push(b.y, b.y + b.h / 2, b.y + b.h);
  }
  if (!_isExcluded(exclude, 'video') && state.video.transform) {
    const t = state.video.transform;
    out.push(t.y, t.y + t.h / 2, t.y + t.h);
  }
  return out;
}

// Snap a bbox's left/centre/right (X) and top/middle/bottom (Y) to the
// nearest targets within SNAP. `exclude` may be a single id or a Set.
// Returns { bestX, bestY } with { cur, v } or null per axis.
function snapBboxMove(bbox, exclude) {
  const xs = getXSnapTargets(exclude);
  const ys = getYSnapTargets(exclude);
  const candX = [bbox.x, bbox.x + bbox.w / 2, bbox.x + bbox.w];
  const candY = [bbox.y, bbox.y + bbox.h / 2, bbox.y + bbox.h];
  let bestX = null, bestXd = SNAP;
  for (const cx of candX) for (const tx of xs) {
    const d = Math.abs(cx - tx);
    if (d < bestXd) { bestXd = d; bestX = { cur: cx, v: tx }; }
  }
  let bestY = null, bestYd = SNAP;
  for (const cy of candY) for (const ty of ys) {
    const d = Math.abs(cy - ty);
    if (d < bestYd) { bestYd = d; bestY = { cur: cy, v: ty }; }
  }
  return { bestX, bestY };
}

// Multi-selection move: snap the union bbox against everything that isn't
// in the selection (canvas + non-selected layers + video). Returns the
// shift {dx, dy} so the caller can apply it to every selected layer
// uniformly — keeping their relative spacing intact while the group as a
// whole locks to a guide.
function snapMoveSelectionDelta() {
  if (state.selectedLayerIds.length < 2) return { dx: 0, dy: 0 };
  const union = computeUnionBbox(state.selectedLayerIds);
  if (!union.w || !union.h) { hideGuides(); return { dx: 0, dy: 0 }; }
  const excludeSet = new Set(state.selectedLayerIds);
  const { bestX, bestY } = snapBboxMove(union, excludeSet);
  if (bestX) showGuideV(bestX.v); else hideGuideV();
  if (bestY) showGuideH(bestY.v); else hideGuideH();
  return {
    dx: bestX ? (bestX.v - bestX.cur) : 0,
    dy: bestY ? (bestY.v - bestY.cur) : 0,
  };
}

function applySnapMove() {
  const t = state.video.transform;
  const { bestX, bestY } = snapBboxMove({ x: t.x, y: t.y, w: t.w, h: t.h }, 'video');
  if (bestX) { t.x += (bestX.v - bestX.cur); showGuideV(bestX.v); } else hideGuideV();
  if (bestY) { t.y += (bestY.v - bestY.cur); showGuideH(bestY.v); } else hideGuideH();
}

// Snap a text/rect layer based on its rendered bbox. Shifts the layer's
// anchor (layer.x / layer.y) by the same delta so the bbox follows.
function applySnapMoveLayer(layer) {
  const b = layer._bbox;
  if (!b) { hideGuides(); return; }
  const { bestX, bestY } = snapBboxMove(b, layer.id);
  if (bestX) { layer.x += (bestX.v - bestX.cur); showGuideV(bestX.v); } else hideGuideV();
  if (bestY) { layer.y += (bestY.v - bestY.cur); showGuideH(bestY.v); } else hideGuideH();
}

// Smallest axis-aligned bbox covering every layer in `ids`. Falls back to
// a zero-area rect at the canvas origin if no layer has a usable bbox.
function computeUnionBbox(ids) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const id of ids) {
    const l = state.layers.find(x => x.id === id);
    if (!l || !l._bbox) continue;
    if (l._bbox.x < minX) minX = l._bbox.x;
    if (l._bbox.y < minY) minY = l._bbox.y;
    if (l._bbox.x + l._bbox.w > maxX) maxX = l._bbox.x + l._bbox.w;
    if (l._bbox.y + l._bbox.h > maxY) maxY = l._bbox.y + l._bbox.h;
  }
  if (!isFinite(minX)) return { x: 0, y: 0, w: 0, h: 0 };
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

// World-space anchor for resizing a ROTATED layer. After the resize logic
// anchors the opposite corner in LOCAL coords, the bbox centre has moved,
// which (under the layer's rotation around its centre) shifts that corner
// in WORLD space. Translate layer.x/y so the opposite corner ends up at
// the same world position it started at — making the visual drag feel
// the same as it would on an unrotated layer.
function applyRotatedWorldAnchor(layer, startBbox, corner, rotDeg) {
  if (!layer._bbox) return;
  const r = rotDeg * Math.PI / 180;
  const opp = (function () {
    // Opposite of the dragged handle (for edges, the midpoint of the
    // opposite edge; for corners, the diagonally opposite corner).
    if (corner === 'n')  return { kx: 0.5, ky: 1 };
    if (corner === 's')  return { kx: 0.5, ky: 0 };
    if (corner === 'w')  return { kx: 1,   ky: 0.5 };
    if (corner === 'e')  return { kx: 0,   ky: 0.5 };
    return {
      kx: corner.includes('w') ? 1 : 0,
      ky: corner.includes('n') ? 1 : 0,
    };
  })();
  const oldOpp = { x: startBbox.x + startBbox.w * opp.kx, y: startBbox.y + startBbox.h * opp.ky };
  const oldC   = { x: startBbox.x + startBbox.w / 2,      y: startBbox.y + startBbox.h / 2 };
  const oldDx = oldOpp.x - oldC.x, oldDy = oldOpp.y - oldC.y;
  const oldWorld = { x: oldC.x + oldDx * Math.cos(r) - oldDy * Math.sin(r),
                     y: oldC.y + oldDx * Math.sin(r) + oldDy * Math.cos(r) };

  const nb = layer._bbox;
  const newOpp = { x: nb.x + nb.w * opp.kx, y: nb.y + nb.h * opp.ky };
  const newC   = { x: nb.x + nb.w / 2,      y: nb.y + nb.h / 2 };
  const newDx = newOpp.x - newC.x, newDy = newOpp.y - newC.y;
  const newWorld = { x: newC.x + newDx * Math.cos(r) - newDy * Math.sin(r),
                     y: newC.y + newDx * Math.sin(r) + newDy * Math.cos(r) };

  layer.x += (oldWorld.x - newWorld.x);
  layer.y += (oldWorld.y - newWorld.y);
}

// Snap while a new shape is being drawn with the rect/text tool. The
// origin corner is fixed; the cursor corner moves. We snap the moving
// edges (x and y) to the nearest target. Works for both kinds — text uses
// maxWidth/boxHeight, rect uses w/h.
function snapToolDraw(layer, originX, originY, ptX, ptY) {
  const b = layer._bbox;
  if (!b) { hideGuides(); return; }
  const movX = ptX < originX ? 'left' : 'right';
  const movY = ptY < originY ? 'top'  : 'bottom';
  const xs = getXSnapTargets(layer.id);
  const ys = getYSnapTargets(layer.id);
  hideGuides();
  const setW = (l, w) => { if (l.kind === 'rect' || l.kind === 'image') l.w = w; else l.maxWidth  = w; };
  const setH = (l, h) => { if (l.kind === 'rect' || l.kind === 'image') l.h = h; else l.boxHeight = h; };

  const curX = movX === 'left' ? b.x : b.x + b.w;
  let bestX = null, bestXd = SNAP;
  for (const t of xs) { const d = Math.abs(curX - t); if (d < bestXd) { bestXd = d; bestX = t; } }
  if (bestX !== null) {
    if (movX === 'left') {
      const right = b.x + b.w;
      const newW = Math.max(2, right - bestX);
      layer.x = bestX;
      setW(layer, newW);
    } else {
      const newW = Math.max(2, bestX - layer.x);
      setW(layer, newW);
    }
    showGuideV(bestX);
  }
  const curY = movY === 'top' ? b.y : b.y + b.h;
  let bestY = null, bestYd = SNAP;
  for (const t of ys) { const d = Math.abs(curY - t); if (d < bestYd) { bestYd = d; bestY = t; } }
  if (bestY !== null) {
    if (movY === 'top') {
      const bottom = b.y + b.h;
      const newH = Math.max(2, bottom - bestY);
      layer.y = bestY;
      setH(layer, newH);
    } else {
      const newH = Math.max(2, bestY - layer.y);
      setH(layer, newH);
    }
    showGuideH(bestY);
  }
}

// Snap a rect layer being resized: snap the moving edge(s) to the nearest
// guide. Free aspect (no ratio lock) — adjusts the corresponding dimension
// independently per axis.
function applySnapResizeRect(layer, corner) {
  hideGuides();
  const xs = getXSnapTargets(layer.id);
  const ys = getYSnapTargets(layer.id);
  const MIN = 8;
  let movX = null, movY = null;
  if (corner.includes('w')) movX = 'left'; else if (corner.includes('e')) movX = 'right';
  if (corner.includes('n')) movY = 'top';  else if (corner.includes('s')) movY = 'bottom';
  // Generic width/height accessors — also covers text-with-box (maxWidth/boxHeight).
  const hasDirectWH = layer.kind === 'rect' || layer.kind === 'image';
  const getW = () => hasDirectWH ? layer.w : (layer.maxWidth  || 0);
  const getH = () => hasDirectWH ? layer.h : (layer.boxHeight || 0);
  const setW = (w) => { if (hasDirectWH) layer.w = w; else layer.maxWidth  = w; };
  const setH = (h) => { if (hasDirectWH) layer.h = h; else layer.boxHeight = h; };

  if (movX) {
    const cur = movX === 'left' ? layer.x : layer.x + getW();
    let bestT = null, bestD = SNAP;
    for (const t of xs) { const d = Math.abs(cur - t); if (d < bestD) { bestD = d; bestT = t; } }
    if (bestT !== null) {
      if (movX === 'left') {
        const right = layer.x + getW();
        const newW = right - bestT;
        if (newW >= MIN) { layer.x = bestT; setW(newW); showGuideV(bestT); }
      } else {
        const newW = bestT - layer.x;
        if (newW >= MIN) { setW(newW); showGuideV(bestT); }
      }
    }
  }
  if (movY) {
    const cur = movY === 'top' ? layer.y : layer.y + getH();
    let bestT = null, bestD = SNAP;
    for (const t of ys) { const d = Math.abs(cur - t); if (d < bestD) { bestD = d; bestT = t; } }
    if (bestT !== null) {
      if (movY === 'top') {
        const bottom = layer.y + getH();
        const newH = bottom - bestT;
        if (newH >= MIN) { layer.y = bestT; setH(newH); showGuideH(bestT); }
      } else {
        const newH = bestT - layer.y;
        if (newH >= MIN) { setH(newH); showGuideH(bestT); }
      }
    }
  }
}

function applySnapResize(corner, alt) {
  hideGuides();
  const t = state.video.transform;
  const sz = activeSize();
  const ratio = t.w / t.h;
  const MIN = MIN_VIDEO_SIZE;
  const curLeft = t.x, curRight = t.x + t.w, curTop = t.y, curBottom = t.y + t.h;
  const curCx = (curLeft + curRight) / 2, curCy = (curTop + curBottom) / 2;

  let movX = null, movY = null;
  if (corner.includes('w')) movX = 'left'; else if (corner.includes('e')) movX = 'right';
  if (corner.includes('n')) movY = 'top';  else if (corner.includes('s')) movY = 'bottom';

  // Snap targets are now generalized — canvas edges/centre PLUS every layer's
  // bbox edges/centre, so the video aligns to rectangles/text too.
  const xTargets = getXSnapTargets('video');
  const yTargets = getYSnapTargets('video');

  let bestX = null, bestXd = SNAP;
  if (movX) { const v = movX === 'left' ? curLeft : curRight; for (const tg of xTargets) { const d = Math.abs(v - tg); if (d < bestXd) { bestXd = d; bestX = tg; } } }
  let bestY = null, bestYd = SNAP;
  if (movY) { const v = movY === 'top' ? curTop : curBottom; for (const tg of yTargets) { const d = Math.abs(v - tg); if (d < bestYd) { bestYd = d; bestY = tg; } } }
  let snapX = bestX, snapY = bestY;
  if (corner.length === 2 && snapX !== null && snapY !== null) {
    if (bestXd <= bestYd) snapY = null; else snapX = null;
  }
  if (snapX !== null) {
    const newW = alt ? Math.max(MIN, Math.abs(curCx - snapX) * 2) : (movX === 'left' ? curRight - snapX : snapX - curLeft);
    if (newW >= MIN) {
      const newH = newW / ratio;
      if (alt) t.x = curCx - newW / 2; else if (movX === 'left') t.x = snapX; else t.x = curLeft;
      if (alt) t.y = curCy - newH / 2; else if (corner.length === 1) t.y = curCy - newH / 2; else t.y = movY === 'top' ? curBottom - newH : curTop;
      t.w = newW; t.h = newH;
      showGuideV(snapX);
    }
  }
  if (snapY !== null) {
    const newH = alt ? Math.max(MIN / ratio, Math.abs(curCy - snapY) * 2) : (movY === 'top' ? curBottom - snapY : snapY - curTop);
    if (newH >= MIN / ratio) {
      const newW = newH * ratio;
      if (alt) t.y = curCy - newH / 2; else if (movY === 'top') t.y = snapY; else t.y = curTop;
      if (alt) t.x = curCx - newW / 2; else if (corner.length === 1) t.x = curCx - newW / 2; else t.x = movX === 'left' ? curRight - newW : curLeft;
      t.w = newW; t.h = newH;
      showGuideH(snapY);
    }
  }
}

// ─── Tools ──────────────────────────────────────────────────────────────
// Active tool drives the canvas cursor and what a pointerdown on the canvas
// means. After a draw, we revert to 'select' so the user can immediately
// edit / move the new layer (Figma behavior).
function setTool(name) {
  state.tool = name;
  toolSelectBtn.classList.toggle('active', name === 'select');
  toolTextBtn.classList.toggle('active',  name === 'text');
  toolRectBtn.classList.toggle('active',  name === 'rect');
  canvas.classList.toggle('tool-text', name === 'text');
  canvas.classList.toggle('tool-rect', name === 'rect');
  // Stepping into a draw tool clears any selection so the new shape is the
  // sole focus of the next pointerdown.
  if (name !== 'select') deselectAll();
}

// ═════════════════════════════════════ Canvas pointer (layer or video selection + drag) ═════════════════════════════════════
canvas.addEventListener('pointerdown', e => {
  // If the user is mid-inline-edit and they click on the canvas, commit the
  // edit and hand selection back to the video (if one is loaded) — otherwise
  // just clear selection.
  if (inlineEditingLayerId) {
    endInlineEdit();
    if (state.video.loaded) selectVideo(); else deselectAll();
    e.preventDefault();
    return;
  }

  const pt = screenToCanvas(e.clientX, e.clientY);

  // 0) Active draw tool — create a shape rooted at the click, then drag
  //    to size; on pointerup, single-click vs drag is resolved.
  if (state.tool === 'rect') { startRectDraw(e, pt); return; }
  if (state.tool === 'text') { startTextDraw(e, pt); return; }

  // 1) Layer hit test (top-most first). Rotated layers: inverse-transform
  //    the pointer into the layer's local (unrotated) frame before testing.
  for (let i = state.layers.length - 1; i >= 0; i--) {
    const l = state.layers[i];
    if (!l._bbox) continue;
    const b = l._bbox;
    let px = pt.x, py = pt.y;
    if (l.rotation) {
      const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
      const dx = pt.x - cx, dy = pt.y - cy;
      const r = -l.rotation * Math.PI / 180;
      px = dx * Math.cos(r) - dy * Math.sin(r) + cx;
      py = dx * Math.sin(r) + dy * Math.cos(r) + cy;
    }
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
      if (e.shiftKey) {
        // Shift-click: toggle membership; don't start a drag.
        toggleLayerSelection(l.id);
        e.preventDefault();
        return;
      }
      // Alt-drag = duplicate-in-place + drag the copy (Figma/Sketch).
      // If the clicked layer wasn't selected, treat it as the one source.
      if (e.altKey) {
        if (!isLayerSelected(l.id)) {
          state.selectedLayerIds = [l.id];
          state.activeLayerId = l.id;
          state.videoSelected = false;
        }
        duplicateSelectedLayersInPlace();   // selection now = the new copies
        refreshLayerList();
        syncEditPanel();
      } else {
        // Plain click on an unselected layer = exclusive select. On an
        // already-selected layer = keep the current multi-selection.
        if (!isLayerSelected(l.id)) selectLayer(l.id);
        pushUndo();   // each layer drag = one undo entry
      }
      const movedIds = state.selectedLayerIds.slice();
      const starts = movedIds.map(id => {
        const ly = state.layers.find(x => x.id === id);
        return ly ? { id, x: ly.x, y: ly.y } : null;
      }).filter(Boolean);
      canvasDrag = {
        kind: 'layer-move',
        starts,
        startCanvasX: pt.x, startCanvasY: pt.y,
        primaryId: state.activeLayerId,
        pointerId: e.pointerId,
      };
      try { canvas.setPointerCapture(e.pointerId); } catch {}
      updateTextToolbar(); // hides because canvasDrag is set
      e.preventDefault();
      return;
    }
  }

  // 2) Video hit test.
  const t = state.video.transform;
  if (t && pt.x >= t.x && pt.x <= t.x + t.w && pt.y >= t.y && pt.y <= t.y + t.h) {
    selectVideo();
    pushUndo();
    canvasDrag = {
      kind: 'video-move',
      startCanvasX: pt.x, startCanvasY: pt.y,
      snapshot: { x: t.x, y: t.y, w: t.w, h: t.h },
      pointerId: e.pointerId,
    };
    try { canvas.setPointerCapture(e.pointerId); } catch {}
    e.preventDefault();
    return;
  }

  // 3) Empty click — deselect.
  deselectAll();
  draw();
});

// Resize handles (DOM) — pointer events resolved against the original client position
// so we work in canvas-coords regardless of the live transform.
handles.forEach(h => {
  h.addEventListener('pointerdown', e => {
    if (!state.video.transform) return;
    e.preventDefault();
    e.stopPropagation();
    selectVideo();
    pushUndo();
    const t = state.video.transform;
    canvasDrag = {
      kind: 'video-resize',
      corner: h.dataset.corner,
      startClientX: e.clientX, startClientY: e.clientY,
      snapshot: { x: t.x, y: t.y, w: t.w, h: t.h },
      pointerId: e.pointerId,
      target: h,
    };
    try { h.setPointerCapture(e.pointerId); } catch {}
  });
});

window.addEventListener('pointermove', e => {
  if (!canvasDrag) return;

  if (canvasDrag.kind === 'multi-rotate') {
    const ang = Math.atan2(e.clientY - canvasDrag.cyScreen, e.clientX - canvasDrag.cxScreen);
    let deltaDeg = (ang - canvasDrag.startAngle) * 180 / Math.PI;
    if (e.shiftKey) deltaDeg = Math.round(deltaDeg / 15) * 15;
    const dRad = deltaDeg * Math.PI / 180;
    const cos = Math.cos(dRad), sin = Math.sin(dRad);
    for (const snap of canvasDrag.snapshots) {
      const l = state.layers.find(x => x.id === snap.id);
      if (!l) continue;
      const sbCx = snap.bbox.x + snap.bbox.w / 2;
      const sbCy = snap.bbox.y + snap.bbox.h / 2;
      const dx = sbCx - canvasDrag.groupCx;
      const dy = sbCy - canvasDrag.groupCy;
      // Each layer's bbox CENTRE orbits the group centre by deltaDeg.
      const newCx = canvasDrag.groupCx + dx * cos - dy * sin;
      const newCy = canvasDrag.groupCy + dx * sin + dy * cos;
      const newBboxX = newCx - snap.bbox.w / 2;
      const newBboxY = newCy - snap.bbox.h / 2;
      // layer.x / layer.y is the anchor — for rect/image it equals bbox.x/y;
      // for text it's offset by alignment. Preserve that offset from the snap.
      const anchorOffsetX = snap.x - snap.bbox.x;
      const anchorOffsetY = snap.y - snap.bbox.y;
      l.x = newBboxX + anchorOffsetX;
      l.y = newBboxY + anchorOffsetY;
      // Each layer also spins by the same angle (its own rotation += delta).
      l.rotation = snap.rotation + deltaDeg;
    }
    draw();
    return;
  }

  if (canvasDrag.kind === 'multi-resize') {
    const u = canvasDrag.union;
    if (u.w < 1 || u.h < 1) return;     // can't scale a zero-area selection
    const corner = canvasDrag.corner;
    const alt = e.altKey;
    const k = alt ? 2 : 1;              // Alt = scale from centre (double rate)
    const dx = (e.clientX - canvasDrag.startClientX) / viewScale;
    const dy = (e.clientY - canvasDrag.startClientY) / viewScale;
    // Anchor: opposite corner (default) or union centre (Alt).
    const anchorX = alt ? u.x + u.w / 2 : (corner.includes('w') ? u.x + u.w : u.x);
    const anchorY = alt ? u.y + u.h / 2 : (corner.includes('n') ? u.y + u.h : u.y);
    // How much the dragged corner moves in each axis, signed so growing the
    // bbox is positive regardless of which corner is being dragged. With Alt,
    // both sides of the centre expand so we apply 2× the drag amount.
    const dragW = (corner.includes('w') ? -dx : dx) * k;
    const dragH = (corner.includes('n') ? -dy : dy) * k;
    // Uniform scale: pick the axis whose drag ratio is bigger so the cursor
    // stays at-or-past the dragged corner of the new bbox.
    const sX = (u.w + dragW) / u.w;
    const sY = (u.h + dragH) / u.h;
    let s = Math.abs(sX) >= Math.abs(sY) ? sX : sY;
    // Clamp positive — disallow flipping for now (cleaner UX for groups).
    s = Math.max(0.05, s);
    for (const snap of canvasDrag.snapshots) {
      const l = state.layers.find(x => x.id === snap.id);
      if (!l) continue;
      // Scale POSITION relative to the anchor (preserves group spacing).
      l.x = anchorX + (snap.x - anchorX) * s;
      l.y = anchorY + (snap.y - anchorY) * s;
      // Scale SIZE per kind. Text uses fontSize (+ box dims if it has a box).
      if (snap.kind === 'rect' || snap.kind === 'image') {
        l.w = Math.max(2, snap.w * s);
        l.h = Math.max(2, snap.h * s);
      } else {
        if (snap.fontSize  != null) l.fontSize  = Math.max(1, Math.round(snap.fontSize * s));
        if (snap.maxWidth  != null) l.maxWidth  = Math.max(8, snap.maxWidth  * s);
        if (snap.boxHeight != null) l.boxHeight = Math.max(8, snap.boxHeight * s);
      }
    }
    draw();
    return;
  }

  if (canvasDrag.kind === 'layer-rotate') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const ang = Math.atan2(e.clientY - canvasDrag.cyScreen, e.clientX - canvasDrag.cxScreen);
    const dDeg = (ang - canvasDrag.startAngle) * 180 / Math.PI;
    let rot = (canvasDrag.startRotation + dDeg) % 360;
    if (rot > 180)  rot -= 360;
    if (rot <= -180) rot += 360;
    if (e.shiftKey) rot = Math.round(rot / 15) * 15;   // Shift snaps to 15°
    layer.rotation = rot;
    draw();
    return;
  }

  if (canvasDrag.kind === 'tool-draw-rect') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const pt = screenToCanvas(e.clientX, e.clientY);
    const dx = pt.x - canvasDrag.originX;
    const dy = pt.y - canvasDrag.originY;
    if (Math.abs(dx) > DRAW_MOVE_THRESHOLD || Math.abs(dy) > DRAW_MOVE_THRESHOLD) canvasDrag.moved = true;
    if (canvasDrag.moved) {
      layer.x = Math.min(canvasDrag.originX, pt.x);
      layer.y = Math.min(canvasDrag.originY, pt.y);
      layer.w = Math.max(2, Math.abs(dx));
      layer.h = Math.max(2, Math.abs(dy));
      draw();
      snapToolDraw(layer, canvasDrag.originX, canvasDrag.originY, pt.x, pt.y);
      draw();
    }
    return;
  }

  if (canvasDrag.kind === 'tool-draw-text') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const pt = screenToCanvas(e.clientX, e.clientY);
    const dx = pt.x - canvasDrag.originX;
    const dy = pt.y - canvasDrag.originY;
    if (Math.abs(dx) > DRAW_MOVE_THRESHOLD || Math.abs(dy) > DRAW_MOVE_THRESHOLD) canvasDrag.moved = true;
    if (canvasDrag.moved) {
      // Drag = constrained text BOX. Anchor stays at the top-left of the
      // dragged rectangle; both width AND height follow the drag, so the
      // bbox is whatever shape the user draws — not just the text fit.
      layer.x = Math.min(canvasDrag.originX, pt.x);
      layer.y = Math.min(canvasDrag.originY, pt.y);
      layer.maxWidth  = Math.max(20, Math.abs(dx));
      layer.boxHeight = Math.max(20, Math.abs(dy));
      draw();
      snapToolDraw(layer, canvasDrag.originX, canvasDrag.originY, pt.x, pt.y);
      draw();
    }
    return;
  }

  if (canvasDrag.kind === 'layer-move') {
    const pt = screenToCanvas(e.clientX, e.clientY);
    let dx = pt.x - canvasDrag.startCanvasX;
    let dy = pt.y - canvasDrag.startCanvasY;
    if (e.shiftKey) { if (Math.abs(dx) > Math.abs(dy)) dy = 0; else dx = 0; }
    // Apply the same dx/dy to every selected layer. No clamping — layers can
    // be positioned anywhere (off-canvas in any direction), like Figma.
    for (const s of canvasDrag.starts) {
      const ly = state.layers.find(l => l.id === s.id);
      if (!ly) continue;
      ly.x = s.x + dx;
      ly.y = s.y + dy;
    }
    draw();
    // Snap as a GROUP: the union bbox of every selected layer gets snapped
    // to canvas + non-selected element guides; the resulting shift is
    // applied uniformly so the whole group locks to the guide together.
    // Single-selection still uses the per-layer snap.
    if (state.selectedLayerIds.length > 1) {
      const { dx: sdx, dy: sdy } = snapMoveSelectionDelta();
      if (sdx !== 0 || sdy !== 0) {
        for (const s of canvasDrag.starts) {
          const ly = state.layers.find(l => l.id === s.id);
          if (ly) { ly.x += sdx; ly.y += sdy; }
        }
        draw();
      }
    } else {
      const primary = state.layers.find(l => l.id === canvasDrag.primaryId);
      if (primary) {
        applySnapMoveLayer(primary);
        draw();
      }
    }

  } else if (canvasDrag.kind === 'video-move') {
    const t = state.video.transform;
    const s = canvasDrag.snapshot;
    const pt = screenToCanvas(e.clientX, e.clientY);
    let dx = pt.x - canvasDrag.startCanvasX;
    let dy = pt.y - canvasDrag.startCanvasY;
    if (e.shiftKey) { if (Math.abs(dx) > Math.abs(dy)) dy = 0; else dx = 0; }
    t.x = s.x + dx;
    t.y = s.y + dy;
    applySnapMove();
    updateVideoChrome();
    draw();

  } else if (canvasDrag.kind === 'video-resize') {
    const t = state.video.transform;
    const s = canvasDrag.snapshot;
    const dx = (e.clientX - canvasDrag.startClientX) / viewScale;
    const dy = (e.clientY - canvasDrag.startClientY) / viewScale;
    const ratio = s.w / s.h;
    const corner = canvasDrag.corner;
    const alt = e.altKey;
    const k = alt ? 2 : 1;
    const MIN = MIN_VIDEO_SIZE;
    let newW, newH, newX, newY;

    if (corner.length === 2) {
      const dwUser = (corner.includes('w') ? -dx : dx) * k;
      const dhUser = (corner.includes('n') ? -dy : dy) * k;
      const dw = (Math.abs(dwUser) > Math.abs(dhUser) * ratio) ? dwUser : dhUser * ratio;
      newW = Math.max(MIN, s.w + dw);
      newH = newW / ratio;
      if (alt) {
        const cx = s.x + s.w / 2, cy = s.y + s.h / 2;
        newX = cx - newW / 2; newY = cy - newH / 2;
      } else {
        newX = corner.includes('w') ? (s.x + s.w) - newW : s.x;
        newY = corner.includes('n') ? (s.y + s.h) - newH : s.y;
      }
    } else if (corner === 'n' || corner === 's') {
      const dh = (corner === 'n' ? -dy : dy) * k;
      newH = Math.max(MIN / ratio, s.h + dh);
      newW = newH * ratio;
      const cx = s.x + s.w / 2;
      newX = cx - newW / 2;
      newY = alt ? (s.y + s.h / 2) - newH / 2 : (corner === 'n' ? (s.y + s.h) - newH : s.y);
    } else {
      const dw = (corner === 'w' ? -dx : dx) * k;
      newW = Math.max(MIN, s.w + dw);
      newH = newW / ratio;
      const cy = s.y + s.h / 2;
      newY = cy - newH / 2;
      newX = alt ? (s.x + s.w / 2) - newW / 2 : (corner === 'w' ? (s.x + s.w) - newW : s.x);
    }
    t.x = newX; t.y = newY; t.w = newW; t.h = newH;
    applySnapResize(corner, alt);
    updateVideoChrome();
    draw();

  } else if (canvasDrag.kind === 'layer-resize') {
    const layer = state.layers.find(l => l.id === canvasDrag.layerId);
    if (!layer) return;
    const s = canvasDrag.snapshot;
    const startBbox = canvasDrag.startBbox;
    const corner = canvasDrag.corner;

    const alt = e.altKey;
    const k = alt ? 2 : 1;     // alt scales twice as fast → center stays fixed

    // Inverse-rotate the screen-space drag delta into the layer's LOCAL
    // (unrotated) frame so the existing axis-aligned resize logic still
